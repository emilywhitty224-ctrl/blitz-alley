<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackout Alley — London, 1940</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>

  <!-- Draco decoder — needed to parse Draco-compressed GLB files. -->
  <script>
    AFRAME.registerComponent('draco-loader', {
      init: function () {
        var dracoLoader = new THREE.DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
        var gltfSystem = this.el.systems['gltf-model'];
        if (gltfSystem && gltfSystem.loader) {
          gltfSystem.loader.setDRACOLoader(dracoLoader);
        }
      }
    });
  </script>

  <script>
    AFRAME.registerComponent('fire-flicker', {
      schema: { min: { default: 0.6 }, max: { default: 1.6 }, chance: { default: 0.08 } },
      tick: function () {
        if (Math.random() < this.data.chance) {
          var v = this.data.min + Math.random() * (this.data.max - this.data.min);
          this.el.setAttribute('light', 'intensity', v);
        }
      }
    });

    // Star field — THREE.js points scattered in dome above scene
    AFRAME.registerComponent('star-field', {
      schema: { count: { type: 'int', default: 800 } },
      init: function () {
        var geo = new THREE.BufferGeometry();
        var pos = [];
        var n = this.data.count;
        for (var i = 0; i < n; i++) {
          var theta = Math.random() * Math.PI * 2;
          var phi   = Math.random() * Math.PI * 0.45;
          var r     = 80 + Math.random() * 30;
          pos.push(
            r * Math.sin(phi) * Math.cos(theta),
            r * Math.cos(phi) + 10,
            r * Math.sin(phi) * Math.sin(theta) - 40
          );
        }
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        var mat = new THREE.PointsMaterial({
          color: 0xc8d8ff, size: 0.28, sizeAttenuation: true,
          transparent: true, opacity: 0.85
        });
        this.el.sceneEl.object3D.add(new THREE.Points(geo, mat));
      }
    });

    // No-op kept so attribute doesn't throw if still present on entities
    AFRAME.registerComponent('victorian-night', { init: function () {} });

    // ── NIGHT TINT ───────────────────────────────────────────────────────
    // Photogrammetry GLBs have daylight baked into their textures — scene
    // lighting alone can't darken them. This component multiplies every
    // material's colour down after load, giving a genuine night appearance.
    // 'brightness' (0–1): how dark. 0.12 ≈ deep night. 'blue' adds moonlight tint.
    AFRAME.registerComponent('night-tint', {
      schema: { brightness: { default: 0.12 }, blue: { default: 1.25 } },
      init: function () {
        var data = this.data;
        this.el.addEventListener('model-loaded', function () {
          this.el.object3D.traverse(function (node) {
            if (!node.isMesh) return;
            var mats = Array.isArray(node.material) ? node.material : [node.material];
            mats.forEach(function (mat) {
              mat.color.r *= data.brightness * 0.85;
              mat.color.g *= data.brightness * 0.9;
              mat.color.b *= data.brightness * data.blue;
              if (mat.emissive) {
                mat.emissive.r *= 0.05;
                mat.emissive.g *= 0.05;
                mat.emissive.b *= 0.05;
              }
            });
          });
        }.bind(this));
      }
    });

    // ── GROUND CLAMP (raycast) ───────────────────────────────────────────
    // Casts a 5×5 grid of rays downward through the model's footprint.
    // Collects every intersection Y, sorts them, and uses the 10th-percentile
    // value as "floor level" — robust against stray low geometry or floating
    // debris that fools a plain bounding-box min.
    AFRAME.registerComponent('ground-clamp', {
      init: function () {
        var el = this.el;
        el.addEventListener('model-loaded', function () {
          requestAnimationFrame(function () {
            el.object3D.position.y = 0;

            // Bounding box gives us the footprint to sample across
            var box = new THREE.Box3().setFromObject(el.object3D);
            if (box.isEmpty()) return;

            // Gather all meshes
            var meshes = [];
            el.object3D.traverse(function (node) {
              if (node.isMesh) meshes.push(node);
            });
            if (meshes.length === 0) return;

            // Cast a 5×5 grid of rays downward through the footprint
            var raycaster = new THREE.Raycaster();
            var dir = new THREE.Vector3(0, -1, 0);
            var hitYs = [];
            var steps = 5;
            for (var xi = 0; xi < steps; xi++) {
              for (var zi = 0; zi < steps; zi++) {
                var x = box.min.x + (box.max.x - box.min.x) * (xi / (steps - 1));
                var z = box.min.z + (box.max.z - box.min.z) * (zi / (steps - 1));
                raycaster.set(new THREE.Vector3(x, box.max.y + 5, z), dir);
                var hits = raycaster.intersectObjects(meshes, false);
                hits.forEach(function (h) { hitYs.push(h.point.y); });
              }
            }

            var floorY;
            if (hitYs.length > 0) {
              // 10th percentile — ignores stray low geometry
              hitYs.sort(function (a, b) { return a - b; });
              floorY = hitYs[Math.floor(hitYs.length * 0.10)];
            } else {
              // Fallback: plain bounding box min
              floorY = box.min.y;
            }

            el.object3D.position.y = -floorY;
          });
        });
      }
    });

    // ── COORD CAPTURE ───────────────────────────────────────────────────
    // Right thumbstick click : capture controller XYZ (up to 5, listed on HUD)
    // Left trigger            : clear list + hide HUD
    // X button (left)         : toggle calibration marker sticks
    // B button (right)        : toggle fly mode
    // A button (right)        : drop a 3 m XYZ reference marker at controller position
    AFRAME.registerComponent('coord-capture', {
      init: function () {
        var self = this;
        self.coords = [];
        self.markersVisible = false;

        this.el.sceneEl.addEventListener('loaded', function () {
          var cam = document.querySelector('#cam');

          // HUD panel — hidden until first capture
          var panel = document.createElement('a-plane');
          panel.setAttribute('position', '0.34 -0.30 -0.5');
          panel.setAttribute('width', '0.58');
          panel.setAttribute('height', '0.42');
          panel.setAttribute('material', 'color:#000000; opacity:0.84; transparent:true; shader:flat');
          panel.setAttribute('visible', 'false');
          cam.appendChild(panel);
          self.panel = panel;

          var hud = document.createElement('a-entity');
          hud.setAttribute('position', '0.07 -0.16 -0.49');
          hud.setAttribute('text', 'value: ; color:#44ff88; align:left; width:0.76');
          hud.setAttribute('visible', 'false');
          cam.appendChild(hud);
          self.hud = hud;

          function fmt(n) { return (n >= 0 ? ' ' : '') + n.toFixed(3); }
          function showHud() {
            self.panel.setAttribute('visible', 'true');
            self.hud.setAttribute('visible', 'true');
          }
          function hideHud() {
            self.panel.setAttribute('visible', 'false');
            self.hud.setAttribute('visible', 'false');
          }
          function updateHud() {
            var lines = self.coords.map(function (p, i) {
              return '#' + (i + 1) + '  X:' + fmt(p.x) + '  Y:' + fmt(p.y) + '  Z:' + fmt(p.z);
            }).join('\n');
            lines += '\n';
            lines += self.coords.length < 5 ? 'RIGHT:+capture  LEFT:hide+clear' : 'LEFT: hide+clear';
            self.hud.setAttribute('text', 'value', lines);
          }

          // ── Calibration marker sticks every 3 m along Z axis ──────────
          var markersEl = document.createElement('a-entity');
          markersEl.setAttribute('id', 'cal-markers');
          markersEl.setAttribute('visible', 'false');
          self.el.sceneEl.appendChild(markersEl);

          var matY    = 'color:#ffdd00; emissive:#ffaa00; emissiveIntensity:0.9; shader:flat';
          var matX    = 'color:#ff4444; emissive:#ff2200; emissiveIntensity:0.9; shader:flat';
          var matZ    = 'color:#4488ff; emissive:#2244ff; emissiveIntensity:0.9; shader:flat';
          var matTick = 'color:#ffffff; emissive:#ffffff; emissiveIntensity:1; shader:flat';

          for (var z = 0; z >= -60; z -= 3) {
            var stickY = document.createElement('a-box');
            stickY.setAttribute('position', '0 1 ' + z);
            stickY.setAttribute('width', '0.06'); stickY.setAttribute('height', '2'); stickY.setAttribute('depth', '0.06');
            stickY.setAttribute('material', matY);
            markersEl.appendChild(stickY);

            // Height tick at 1.73 m (5'8")
            var tick = document.createElement('a-box');
            tick.setAttribute('position', '0 1.73 ' + z);
            tick.setAttribute('width', '0.28'); tick.setAttribute('height', '0.04'); tick.setAttribute('depth', '0.04');
            tick.setAttribute('material', matTick);
            markersEl.appendChild(tick);
            var tickLbl = document.createElement('a-text');
            tickLbl.setAttribute('value', "5'8\"");
            tickLbl.setAttribute('position', '0.18 1.73 ' + z);
            tickLbl.setAttribute('color', '#ffffff');
            tickLbl.setAttribute('width', '2');
            tickLbl.setAttribute('align', 'left');
            markersEl.appendChild(tickLbl);

            var armX = document.createElement('a-box');
            armX.setAttribute('position', '0 1 ' + z);
            armX.setAttribute('width', '2'); armX.setAttribute('height', '0.06'); armX.setAttribute('depth', '0.06');
            armX.setAttribute('material', matX);
            markersEl.appendChild(armX);

            var armZ = document.createElement('a-box');
            armZ.setAttribute('position', '0 1 ' + z);
            armZ.setAttribute('width', '0.06'); armZ.setAttribute('height', '0.06'); armZ.setAttribute('depth', '2');
            armZ.setAttribute('material', matZ);
            markersEl.appendChild(armZ);

            var lbl = document.createElement('a-text');
            lbl.setAttribute('value', 'Z=' + z + 'm');
            lbl.setAttribute('position', '0.12 2.2 ' + z);
            lbl.setAttribute('color', '#ffee44');
            lbl.setAttribute('width', '3');
            lbl.setAttribute('align', 'left');
            markersEl.appendChild(lbl);
          }

          // ── Controller wiring ──────────────────────────────────────────
          var rightCtrl = document.querySelector('[oculus-touch-controls*="right"]');
          var leftCtrl  = document.querySelector('[oculus-touch-controls*="left"]');
          var rigEl     = document.querySelector('#rig');
          var flying    = false;

          if (rightCtrl) {
            rightCtrl.addEventListener('thumbstickdown', function () {
              if (self.coords.length >= 5) return;
              var p = new THREE.Vector3();
              rightCtrl.object3D.getWorldPosition(p);
              self.coords.push({ x: p.x, y: p.y, z: p.z });
              showHud();
              updateHud();
            });

            rightCtrl.addEventListener('bbuttondown', function () {
              flying = !flying;
              if (flying) {
                rigEl.setAttribute('movement-controls', 'fly: true; speed: 1.5; camera: #cam');
              } else {
                rigEl.setAttribute('movement-controls', 'fly: false; speed: 0.8; camera: #cam');
                rigEl.object3D.position.y = 0;
              }
              var bLbl = rightCtrl.querySelector('.lbl-b');
              if (bLbl) bLbl.setAttribute('text', 'value', flying ? 'B: land' : 'B: fly');
            });

            rightCtrl.addEventListener('abuttondown', function () {
              var p = new THREE.Vector3();
              rightCtrl.object3D.getWorldPosition(p);
              var marker = document.createElement('a-entity');
              marker.setAttribute('position', p.x + ' ' + p.y + ' ' + p.z);
              var aY = document.createElement('a-box');
              aY.setAttribute('position', '0 0 0');
              aY.setAttribute('width', '0.05'); aY.setAttribute('height', '3'); aY.setAttribute('depth', '0.05');
              aY.setAttribute('material', 'color:#00ff44; emissive:#00cc33; emissiveIntensity:1; shader:flat');
              marker.appendChild(aY);
              var aX = document.createElement('a-box');
              aX.setAttribute('position', '0 0 0');
              aX.setAttribute('width', '3'); aX.setAttribute('height', '0.05'); aX.setAttribute('depth', '0.05');
              aX.setAttribute('material', 'color:#ff2222; emissive:#ff0000; emissiveIntensity:1; shader:flat');
              marker.appendChild(aX);
              var aZ = document.createElement('a-box');
              aZ.setAttribute('position', '0 0 0');
              aZ.setAttribute('width', '0.05'); aZ.setAttribute('height', '0.05'); aZ.setAttribute('depth', '3');
              aZ.setAttribute('material', 'color:#2244ff; emissive:#0022ff; emissiveIntensity:1; shader:flat');
              marker.appendChild(aZ);
              var dot = document.createElement('a-sphere');
              dot.setAttribute('radius', '0.08');
              dot.setAttribute('material', 'color:#ffffff; emissive:#ffffff; emissiveIntensity:1; shader:flat');
              marker.appendChild(dot);
              self.el.sceneEl.appendChild(marker);
            });
          }

          if (leftCtrl) {
            leftCtrl.addEventListener('triggerdown', function () {
              self.coords = [];
              hideHud();
            });
            leftCtrl.addEventListener('xbuttondown', function () {
              self.markersVisible = !self.markersVisible;
              markersEl.setAttribute('visible', self.markersVisible ? 'true' : 'false');
            });
          }
        });
      }
    });
  </script>

  <script>
    // ── VR PLACER ────────────────────────────────────────────────────────
    // Right GRIP              : laser on + select building
    // Right GRIP + TRIGGER    : move selected building (smooth)
    // Right STICK L/R         : spin building
    // Left  STICK U/D         : scale building
    // Left  STICK click       : undo last move
    // Left  GRIP (alone)      : stamp 5'8" height post
    // Left  GRIP (while R gripping): reset building to original position
    // Left  Y                 : export positions + copy to clipboard
    AFRAME.registerComponent('vr-placer', {
      init: function () {
        var self = this;
        self.held       = null;
        self.gripping   = false;
        self.moving     = false;
        self.stickX     = 0;
        self.scaleY     = 0;
        self.raycaster  = new THREE.Raycaster();
        self.tmpQuat    = new THREE.Quaternion();
        self.groundPt   = new THREE.Vector3();
        self.laserPivot = null;
        self.hovered    = null;
        self.history    = []; // undo stack [{el, x, z, rotY, scale}]
        self.originals  = {}; // reset map keyed by data-name

        this.el.sceneEl.addEventListener('loaded', function () {
          var cam       = document.querySelector('#cam');
          var rigEl     = document.querySelector('#rig');
          var rightCtrl = document.querySelector('[oculus-touch-controls*="right"]');
          var leftCtrl  = document.querySelector('[oculus-touch-controls*="left"]');

          // ── Store original positions for reset ───────────────────
          requestAnimationFrame(function () {
            document.querySelectorAll('.placeable').forEach(function (el) {
              var id = el.getAttribute('data-name');
              var p  = el.object3D.position;
              self.originals[id] = {
                x: p.x, z: p.z,
                rotY: el.object3D.rotation.y,
                scale: el.object3D.scale.x
              };
            });
          });

          // ── Helpers: highlight / unhighlight ────────────────────
          function setHighlight(el, on) {
            if (!el) return;
            el.object3D.traverse(function (node) {
              if (!node.isMesh) return;
              var mats = Array.isArray(node.material) ? node.material : [node.material];
              mats.forEach(function (mat) {
                if (on) {
                  if (!mat._origEmissive) mat._origEmissive = mat.emissive.clone();
                  mat.emissive.setRGB(0.18, 0.18, 0.05);
                } else {
                  if (mat._origEmissive) mat.emissive.copy(mat._origEmissive);
                }
              });
            });
          }

          // ── Laser pivot — tilted 45° down ────────────────────────
          var laserPivot = document.createElement('a-entity');
          laserPivot.setAttribute('rotation', '-45 0 0');
          laserPivot.setAttribute('visible', 'false');
          var laser = document.createElement('a-box');
          laser.setAttribute('width',  '0.005');
          laser.setAttribute('height', '0.005');
          laser.setAttribute('depth',  '20');
          laser.setAttribute('position', '0 0 -10');
          laser.setAttribute('material', 'color:#00ffcc; emissive:#00ffcc; emissiveIntensity:1; shader:flat; opacity:0.6; transparent:true');
          laserPivot.appendChild(laser);
          if (rightCtrl) rightCtrl.appendChild(laserPivot);
          self.laser      = laser;
          self.laserPivot = laserPivot;

          // ── Output HUD ──────────────────────────────────────────
          var outPanel = document.createElement('a-plane');
          outPanel.setAttribute('position', '0 0.08 -0.6');
          outPanel.setAttribute('width',  '1.1');
          outPanel.setAttribute('height', '0.72');
          outPanel.setAttribute('material', 'color:#000811; opacity:0.92; transparent:true; shader:flat');
          outPanel.setAttribute('visible', 'false');
          cam.appendChild(outPanel);

          var outText = document.createElement('a-entity');
          outText.setAttribute('position', '-0.52 0.42 -0.59');
          outText.setAttribute('text', 'value: ; color:#44ffaa; align:left; width:1.1; wrapCount:52');
          outText.setAttribute('visible', 'false');
          cam.appendChild(outText);
          self.outPanel = outPanel;
          self.outText  = outText;

          // ── Right controller ─────────────────────────────────────
          if (rightCtrl) {
            rightCtrl.addEventListener('gripdown', function () {
              self.gripping = true;
              laserPivot.setAttribute('visible', 'true');
              if (rigEl) rigEl.setAttribute('movement-controls', 'enabled: false');
              // selection happens in tick via hover — held = hovered on grip
              if (self.hovered) {
                // save to undo history before moving
                self.history.push({
                  el:    self.hovered,
                  x:     self.hovered.object3D.position.x,
                  z:     self.hovered.object3D.position.z,
                  rotY:  self.hovered.object3D.rotation.y,
                  scale: self.hovered.object3D.scale.x
                });
                self.held = self.hovered;
              }
            });

            rightCtrl.addEventListener('gripup', function () {
              if (self.held) setHighlight(self.held, false);
              self.gripping = false;
              self.moving   = false;
              self.held     = null;
              self.stickX   = 0;
              laserPivot.setAttribute('visible', 'false');
              if (rigEl) rigEl.setAttribute('movement-controls', 'enabled: true');
            });

            rightCtrl.addEventListener('triggerdown', function () {
              if (self.gripping && self.held) self.moving = true;
            });
            rightCtrl.addEventListener('triggerup', function () {
              self.moving = false;
            });

            rightCtrl.addEventListener('thumbstickmoved', function (e) {
              self.stickX = e.detail.x;
            });
          }

          // ── Left controller ──────────────────────────────────────
          if (leftCtrl) {
            leftCtrl.addEventListener('thumbstickmoved', function (e) {
              self.scaleY = e.detail.y;
            });

            // Left stick CLICK → undo last move
            leftCtrl.addEventListener('thumbstickdown', function () {
              if (self.history.length === 0) return;
              var last = self.history.pop();
              last.el.object3D.position.x  = last.x;
              last.el.object3D.position.z  = last.z;
              last.el.object3D.rotation.y  = last.rotY;
              last.el.object3D.scale.setScalar(last.scale);
            });

            // Left GRIP — stamp height post OR reset building if right gripping
            leftCtrl.addEventListener('gripdown', function () {
              if (self.gripping && self.held) {
                // Reset to original position
                var id   = self.held.getAttribute('data-name');
                var orig = self.originals[id];
                if (orig) {
                  self.held.object3D.position.x = orig.x;
                  self.held.object3D.position.z = orig.z;
                  self.held.object3D.rotation.y = orig.rotY;
                  self.held.object3D.scale.setScalar(orig.scale);
                }
              } else {
                // Stamp 5'8" height post
                var p = new THREE.Vector3();
                leftCtrl.object3D.getWorldPosition(p);
                var post = document.createElement('a-entity');
                post.setAttribute('position', p.x + ' 0 ' + p.z);
                var pole = document.createElement('a-box');
                pole.setAttribute('width', '0.04'); pole.setAttribute('height', '1.73'); pole.setAttribute('depth', '0.04');
                pole.setAttribute('position', '0 0.865 0');
                pole.setAttribute('material', 'color:#ffee44; emissive:#ffcc00; emissiveIntensity:0.8; shader:flat; opacity:0.85; transparent:true');
                post.appendChild(pole);
                var cap = document.createElement('a-sphere');
                cap.setAttribute('radius', '0.06'); cap.setAttribute('position', '0 1.73 0');
                cap.setAttribute('material', 'color:#ffffff; emissive:#ffffff; emissiveIntensity:1; shader:flat');
                post.appendChild(cap);
                var bar = document.createElement('a-box');
                bar.setAttribute('width', '0.5'); bar.setAttribute('height', '0.03'); bar.setAttribute('depth', '0.03');
                bar.setAttribute('position', '0 1.73 0');
                bar.setAttribute('material', 'color:#ffffff; emissive:#ffffff; emissiveIntensity:1; shader:flat');
                post.appendChild(bar);
                var lbl = document.createElement('a-text');
                lbl.setAttribute('value', "5'8\" / 1.73m"); lbl.setAttribute('position', '0.3 1.73 0');
                lbl.setAttribute('color', '#ffffff'); lbl.setAttribute('width', '1.8'); lbl.setAttribute('align', 'left');
                post.appendChild(lbl);
                self.el.sceneEl.appendChild(post);
              }
            });

            // Y button — export positions + copy to clipboard
            leftCtrl.addEventListener('ybuttondown', function () {
              var vis = outPanel.getAttribute('visible');
              if (vis === 'true' || vis === true) {
                outPanel.setAttribute('visible', 'false');
                outText.setAttribute('visible',  'false');
                return;
              }
              var lines = '── PASTE INTO HTML ──\n';
              document.querySelectorAll('.placeable').forEach(function (el) {
                var p  = el.object3D.position;
                var sc = el.object3D.scale.x.toFixed(3);
                var ry = Math.round(THREE.MathUtils.radToDeg(el.object3D.rotation.y));
                var id = el.getAttribute('data-name') || '?';
                lines += id + '\n';
                lines += 'pos="' + p.x.toFixed(2) + ' 0 ' + p.z.toFixed(2) + '"\n';
                lines += 'rot="0 ' + ry + ' 0"\n';
                lines += 'scale="' + sc + ' ' + sc + ' ' + sc + '"\n\n';
              });
              outText.setAttribute('text', 'value', lines);
              outPanel.setAttribute('visible', 'true');
              outText.setAttribute('visible',  'true');
              // Auto-copy to clipboard
              if (navigator.clipboard) navigator.clipboard.writeText(lines).catch(function(){});
            });
          }

          // ── Floating name labels above each building ─────────────
          document.querySelectorAll('.placeable').forEach(function (el) {
            var name = el.getAttribute('data-name') || '';
            if (!name) return;
            var lbl = document.createElement('a-text');
            lbl.setAttribute('value', name);
            lbl.setAttribute('position', '0 8 0');
            lbl.setAttribute('align', 'center');
            lbl.setAttribute('color', '#ffee88');
            lbl.setAttribute('width', '12');
            lbl.setAttribute('material', 'shader:flat');
            el.appendChild(lbl);
          });

          self._setHighlight = setHighlight;
        });
      },

      tick: function () {
        if (!this.laserPivot || !this._setHighlight) return;

        // ── Live hover: cast ray every frame when laser is on ────
        if (this.gripping) {
          var origin = new THREE.Vector3();
          var dir    = new THREE.Vector3(0, 0, -1);
          this.laserPivot.object3D.getWorldPosition(origin);
          this.laserPivot.object3D.getWorldQuaternion(this.tmpQuat);
          dir.applyQuaternion(this.tmpQuat).normalize();
          this.raycaster.set(origin, dir);

          var meshes = [], elMap = [];
          document.querySelectorAll('.placeable').forEach(function (el) {
            el.object3D.traverse(function (node) {
              if (node.isMesh) { meshes.push(node); elMap.push({ mesh: node, el: el }); }
            });
          });

          var hits = this.raycaster.intersectObjects(meshes, false);
          var newHovered = null;
          if (hits.length > 0) {
            var hitMesh = hits[0].object;
            for (var i = 0; i < elMap.length; i++) {
              if (elMap[i].mesh === hitMesh) { newHovered = elMap[i].el; break; }
            }
          }

          // Update highlight if hovered target changed
          if (newHovered !== this.hovered) {
            if (this.hovered && this.hovered !== this.held) this._setHighlight(this.hovered, false);
            this.hovered = newHovered;
            if (this.hovered) this._setHighlight(this.hovered, true);
          }

          // On gripdown the held was set from hovered — keep highlight on held
        }

        if (!this.held) return;

        // ── Move: grip + trigger ─────────────────────────────────
        if (this.moving) {
          var o2  = new THREE.Vector3();
          var d2  = new THREE.Vector3(0, 0, -1);
          this.laserPivot.object3D.getWorldPosition(o2);
          this.laserPivot.object3D.getWorldQuaternion(this.tmpQuat);
          d2.applyQuaternion(this.tmpQuat).normalize();
          if (d2.y < -0.001) {
            var t = -o2.y / d2.y;
            if (t > 0.3) {
              this.groundPt.copy(o2).addScaledVector(d2, t);
              this.held.object3D.position.x += (this.groundPt.x - this.held.object3D.position.x) * 0.18;
              this.held.object3D.position.z += (this.groundPt.z - this.held.object3D.position.z) * 0.18;
            }
          }
        }

        // ── Spin ─────────────────────────────────────────────────
        if (Math.abs(this.stickX) > 0.15) {
          this.held.object3D.rotation.y += this.stickX * 0.055;
        }

        // ── Scale ────────────────────────────────────────────────
        if (Math.abs(this.scaleY) > 0.15) {
          var ns = Math.max(0.05, this.held.object3D.scale.x - this.scaleY * 0.003);
          this.held.object3D.scale.setScalar(ns);
        }
      }
    });
  </script>

  <script>
    function unlockAudio() {
      var ctx = AFRAME.THREE.AudioContext.getContext();
      if (ctx && ctx.state === 'suspended') ctx.resume();
    }
    ['click','touchstart','touchend'].forEach(function(e) {
      document.addEventListener(e, unlockAudio);
    });
    window.addEventListener('load', function() {
      var scene = document.querySelector('a-scene');
      if (scene) scene.addEventListener('enter-vr', unlockAudio);
    });
  </script>
</head>
<body>
<a-scene
  draco-loader
  coord-capture
  star-field
  vr-placer
  fog="type: linear; color: #b0c8e8; near: 60; far: 120"
  renderer="colorManagement: true; antialias: true; physicallyCorrectLights: true; exposure: 1.0"
  shadow="type: pcfsoft"
  background="color: #87ceeb">

  <a-assets timeout="90000">
    <a-asset-item id="gatehouse-glb"   src="st_bartholomews_gatehouse.glb"></a-asset-item>
    <a-asset-item id="princelet-glb"   src="4_princelet_street.glb"></a-asset-item>
    <a-asset-item id="blackfriar-glb"  src="the_blackfriar_pub.glb"></a-asset-item>
    <a-asset-item id="factory-glb"     src="victorian_factory.glb"></a-asset-item>
    <a-asset-item id="fence-glb"       src="stylized_victorian_fence.glb"></a-asset-item>
    <a-asset-item id="antique-glb"     src="antique_shop.glb"></a-asset-item>
  </a-assets>

  <!-- ═══ LIGHTING — TEMP DAYLIGHT ═══ -->
  <a-light type="ambient" color="#ffffff" intensity="1.2"></a-light>
  <a-light type="hemisphere" color="#87ceeb" groundColor="#8B7355" intensity="1.0"></a-light>
  <a-light type="directional" color="#ffffff" intensity="1.8"
           position="-5 20 10"
           castShadow="true"
           shadow-camera-near="0.5" shadow-camera-far="80"
           shadow-camera-left="-40" shadow-camera-right="40"
           shadow-camera-top="40" shadow-camera-bottom="-40"
           shadow-map-width="2048" shadow-map-height="2048"></a-light>
  <a-light type="point" color="#ff7722" intensity="0.7" distance="50" decay="1.4"
           position="0 3 -50" fire-flicker></a-light>

  <!-- ═══ GROUND ═══ -->
  <a-plane position="0 0 -40" rotation="-90 0 0" width="120" height="120"
           material="color:#1a1810; roughness:0.95; metalness:0"></a-plane>

  <a-sky color="#87ceeb"></a-sky>

  <!-- ═══ GROUND ZERO marker — glowing ring at spawn reference point ═══ -->
  <a-torus position="0 0.02 -33" rotation="-90 0 0" radius="1.2" radius-tubular="0.04"
           material="color:#00ffcc; emissive:#00ffcc; emissiveIntensity:1; shader:flat; opacity:0.7; transparent:true">
  </a-torus>
  <a-text value="GROUND ZERO" position="0 0.05 -31.6" rotation="-90 0 0"
          color="#00ffcc" width="4" align="center"
          material="shader:flat"></a-text>

  <!-- ── Compass rose — flat on ground around ground zero ── -->
  <a-torus position="0 0.01 -33" rotation="-90 0 0" radius="3.5" radius-tubular="0.03"
           material="color:#334455; emissive:#223344; emissiveIntensity:0.5; shader:flat; opacity:0.6; transparent:true"></a-torus>
  <a-text value="N" position="0 0.02 -36.6"  rotation="-90 0 0" color="#ff4444" width="3" align="center" material="shader:flat"></a-text>
  <a-text value="S" position="0 0.02 -29.4"  rotation="-90 0 0" color="#ff4444" width="3" align="center" material="shader:flat"></a-text>
  <a-text value="E" position="3.6 0.02 -33"  rotation="-90 0 0" color="#aaaaff" width="3" align="center" material="shader:flat"></a-text>
  <a-text value="W" position="-3.6 0.02 -33" rotation="-90 0 0" color="#aaaaff" width="3" align="center" material="shader:flat"></a-text>
  <!-- Tick lines at cardinal points -->
  <a-box position="0 0.02 -36.5"  rotation="-90 0 0"   width="0.08" height="0.5" depth="0.02" material="color:#ff4444; shader:flat"></a-box>
  <a-box position="0 0.02 -29.5"  rotation="-90 0 0"   width="0.08" height="0.5" depth="0.02" material="color:#ff4444; shader:flat"></a-box>
  <a-box position="3.5 0.02 -33"  rotation="-90 0 90"  width="0.08" height="0.5" depth="0.02" material="color:#aaaaff; shader:flat"></a-box>
  <a-box position="-3.5 0.02 -33" rotation="-90 0 90"  width="0.08" height="0.5" depth="0.02" material="color:#aaaaff; shader:flat"></a-box>

  <!-- ── Controls board — small, flat on the ground beside the ring ── -->
  <a-plane position="2.2 0.02 -33" rotation="-90 0 0" width="2.2" height="1.4"
           material="color:#000a06; opacity:0.85; transparent:true; shader:flat"></a-plane>
  <a-text value="GRIP (R)          laser + select&#10;GRIP+TRIGGER (R)  move building&#10;STICK L/R (R)     spin&#10;STICK U/D (L)     scale&#10;STICK CLICK (L)   undo last move&#10;GRIP (L)          stamp height post&#10;GRIP (L)+GRIP (R) reset building&#10;Y (L)             export + copy&#10;B (R)             fly / land&#10;X (L)             cal markers&#10;STICK↓ (R)        capture coord"
          position="2.2 0.03 -33" rotation="-90 0 -0"
          color="#aaffdd" width="2.0" align="left" wrap-count="28"
          material="shader:flat"></a-text>

  <!-- ═══ BUILDINGS — drag with right grip to place, Y button to export ═══ -->
  <a-entity class="placeable" data-name="gatehouse" id="b-gatehouse"
    gltf-model="#gatehouse-glb"
    position="-8 0 -45" rotation="0 0 0" scale="0.333 0.333 0.333">
  </a-entity>

  <a-entity class="placeable" data-name="blackfriar" id="b-blackfriar"
    gltf-model="#blackfriar-glb"
    position="0 0 -45" rotation="0 0 0" scale="0.333 0.333 0.333">
  </a-entity>

  <a-entity class="placeable" data-name="princelet" id="b-princelet"
    gltf-model="#princelet-glb"
    position="8 0 -45" rotation="0 0 0" scale="0.333 0.333 0.333">
  </a-entity>

  <a-entity class="placeable" data-name="factory" id="b-factory"
    gltf-model="#factory-glb"
    position="16 0 -45" rotation="0 0 0" scale="0.333 0.333 0.333">
  </a-entity>

  <a-entity class="placeable" data-name="antique" id="b-antique"
    gltf-model="#antique-glb"
    position="24 0 -45" rotation="0 0 0" scale="0.333 0.333 0.333">
  </a-entity>

  <a-entity class="placeable" data-name="fence" id="b-fence"
    gltf-model="#fence-glb"
    position="32 0 -45" rotation="0 0 0" scale="0.333 0.333 0.333">
  </a-entity>

  <!-- ═══ PLAYER ═══
       Spawns at ground zero, looking toward the buildings. -->
  <a-entity id="rig" position="0 0 -33"
            movement-controls="fly: false; speed: 0.8; camera: #cam">
    <a-entity id="cam" camera look-controls position="0 1.6 0"></a-entity>

    <a-entity oculus-touch-controls="hand: left">
      <a-text value="X: markers"    position="0.032 0.018 -0.052" rotation="-50 0 0" color="#ffee44" width="0.16" align="left"></a-text>
      <a-text value="Y: export pos" position="-0.012 0.038 -0.052" rotation="-50 0 0" color="#44ffaa" width="0.16" align="left"></a-text>
      <a-text value="trigger: clear" position="0.018 0.008 -0.082" rotation="-20 0 0" color="#ff8888" width="0.16" align="left"></a-text>
      <a-text value="stick: move"   position="-0.01 0.048 -0.032" rotation="-70 0 0" color="#88aaff" width="0.16" align="left"></a-text>
    </a-entity>

    <a-entity oculus-touch-controls="hand: right">
      <a-text value="A: ref mark"    position="0.032 0.008 -0.052" rotation="-50 0 0" color="#ffaa44" width="0.16" align="left"></a-text>
      <a-text class="lbl-b" value="B: fly" position="-0.012 0.038 -0.052" rotation="-50 0 0" color="#88ff88" width="0.16" align="left"></a-text>
      <a-text value="stick↓: capture" position="0.018 0.008 -0.082" rotation="-20 0 0" color="#ff8888" width="0.16" align="left"></a-text>
      <a-text value="stick: move"    position="-0.01 0.048 -0.032" rotation="-70 0 0" color="#88aaff" width="0.16" align="left"></a-text>
    </a-entity>
  </a-entity>

</a-scene>
</body>
</html>
