<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackout Alley — London, 1940</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>

  <!-- VR placer tools — all reusable A-Frame components -->
  <script src="vr-placer.js"></script>

  <script>
    var PLACER_VERSION = 'v1.5';
  </script>

  <script>
    // ── RADIAL MENU ITEMS — left trigger hold to open wheel, stick to pick ──
    // id: used for naming spawned copies (gatehouse-1, gatehouse-2, …)
    // src: <a-asset-item> id in the scene
    // scale: same scale used by the staged entity
    window._radialMenuItems = [
      { id: 'gatehouse',    name: 'GATEHOUSE',  src: '#gatehouse-glb',        scale: 0.232, desc: 'Medieval stone gateway arch.\nGood as an entrance or ruin piece.' },
      { id: 'blackfriar',   name: 'BLACKFRIAR', src: '#blackfriar-glb',       scale: 0.694, desc: 'Ornate Victorian pub frontage.\nDecorative terracotta facade.' },
      { id: 'princelet',    name: 'PRINCELET',  src: '#princelet-glb',        scale: 1.404, desc: 'Georgian townhouse, 3 storeys.\nBrick terrace with sash windows.' },
      { id: 'factory',      name: 'FACTORY',    src: '#factory-glb',          scale: 0.771, desc: 'Industrial brick mill.\nTall chimney stack. East End style.' },
      { id: 'derelict-fac', name: 'DERELICT',   src: '#derelict-factory-glb', scale: 1.0,   desc: 'Bomb-damaged factory shell.\nCollapsed roof — place near rubble.' },
      { id: 'vic-pack',     name: 'VIC.PACK',   src: '#victorian-pack-glb',   scale: 1.0,   desc: 'Victorian street dressing pack.\nLamp, pillar box, cobblestones.' },
      { id: 'brick-wall',   name: 'WALL',       src: '#brick-wall-glb',       scale: 1.0,   desc: 'Brick boundary wall section.\nStack multiples to build longer runs.' },
      { id: 'rubble',       name: 'RUBBLE',     src: '#rubble-glb',           scale: 1.0,   desc: 'LiDAR-scanned rubble pile.\nDrop at bomb sites or blocked ends.' },
      { id: 'old-lamp',     name: 'LAMP',       src: '#old-lamp-glb',         scale: 1.0,   desc: 'Cast iron gas lamp post.\nPlace along streets or alley edges.' },
      { id: 'antique-shop', name: 'ANTIQUE',    src: '#antique-shop-glb',     scale: 1.0,   desc: 'Victorian antique shop front.\nBay window and painted signage.' },
      { id: 'vic-fence',    name: 'FENCE',      src: '#victorian-fence-glb',  scale: 1.0,   desc: 'Ornate Victorian iron fence.\nUse along garden or road edges.' },
      { id: 'vic-street',   name: 'STREET',     src: '#victorian-street-glb', scale: 1.0,   desc: 'Victorian street section.\nCobbles and kerb. Tile the ground.' },
      { id: 'arch',         name: 'ARCH',       src: '#gunnersbury-arch-glb', scale: 1.0,   desc: 'Stone arch, Gunnersbury style.\nGrand entrances or collapsed ruins.' }
    ];

    // Shared day/night toggle — called by both the world button and left trigger
    window._nightMode = false;
    window.toggleNight = function () {
      window._nightMode = !window._nightMode;
      var scene  = document.querySelector('a-scene');
      var sky    = document.querySelector('a-sky');
      var btn    = document.querySelector('#night-btn');
      if (window._nightMode) {
        if (sky) sky.setAttribute('color', '#020408');
        scene.setAttribute('fog', 'type: linear; color: #050810; near: 20; far: 70');
        scene.setAttribute('renderer', 'colorManagement: true; antialias: false; physicallyCorrectLights: true; exposure: 0.08');
        if (btn) btn.setAttribute('material', 'color:#330800; emissive:#cc3300; emissiveIntensity:1; shader:flat');
      } else {
        if (sky) sky.setAttribute('color', '#87ceeb');
        scene.setAttribute('fog', 'type: linear; color: #b0c8e8; near: 60; far: 120');
        scene.setAttribute('renderer', 'colorManagement: true; antialias: false; physicallyCorrectLights: true; exposure: 1.0');
        if (btn) btn.setAttribute('material', 'color:#112233; emissive:#0055cc; emissiveIntensity:1; shader:flat');
      }
      // Apply/remove night tint on all registered buildings
      (window._nightAware || []).forEach(function (c) { c.applyNight(window._nightMode); });
    };

    // Wire up buttons (gaze fuse fires 'click')
    document.addEventListener('DOMContentLoaded', function () {
      // Set version label on night button post
      var vLabel = document.querySelector('#version-label');
      if (vLabel) vLabel.setAttribute('value', PLACER_VERSION);

      // Night toggle
      var nightBtn = document.querySelector('#night-btn');
      if (nightBtn) nightBtn.addEventListener('click', window.toggleNight);

      // Visitor / walk mode toggle
      window.toggleVisitorMode = function () {
        window._visitorMode = !window._visitorMode;
        var vBtn = document.querySelector('#visitor-btn');
        var vLbl = document.querySelector('#visitor-sub');
        var scene = document.querySelector('a-scene');
        var rig   = document.querySelector('#rig');
        if (window._visitorMode) {
          // VISITOR: disable placer laser, normal walk speed, hide builder UI
          if (vBtn) vBtn.setAttribute('material', 'color:#003300; emissive:#00ff44; emissiveIntensity:1; shader:flat');
          if (vLbl) vLbl.setAttribute('value', 'VISITOR');
          if (rig)  rig.setAttribute('movement-controls', 'fly: false; speed: 1.4; camera: #cam');
          if (scene) scene.setAttribute('vr-placer', 'disabled: true');
        } else {
          // BUILD: re-enable placer, builder speed
          if (vBtn) vBtn.setAttribute('material', 'color:#112211; emissive:#225500; emissiveIntensity:1; shader:flat');
          if (vLbl) vLbl.setAttribute('value', 'BUILD');
          if (rig)  rig.setAttribute('movement-controls', 'fly: false; speed: 0.8; camera: #cam');
          if (scene) scene.setAttribute('vr-placer', 'disabled: false');
        }
      };
      var vBtn2 = document.querySelector('#visitor-btn');
      if (vBtn2) vBtn2.addEventListener('click', window.toggleVisitorMode);

      // Reset map — two-gaze confirmation
      var resetBtn  = document.querySelector('#reset-btn');
      var resetLbl  = document.querySelector('#reset-lbl');
      var _pending  = false;
      var _cancelT  = null;

      function cancelReset() {
        _pending = false;
        clearTimeout(_cancelT);
        if (resetBtn) resetBtn.setAttribute('material', 'color:#221111; emissive:#aa1111; emissiveIntensity:1; shader:flat');
        if (resetLbl) resetLbl.setAttribute('text', 'value: RESET MAP');
      }

      function doReset() {
        var originals = window._placerOriginals || {};
        document.querySelectorAll('.placeable').forEach(function (el) {
          var id   = el.getAttribute('data-name');
          var orig = originals[id];
          if (!orig) return;
          el.object3D.position.set(orig.x, orig.y || 0, orig.z);
          el.object3D.rotation.y = orig.rotY || 0;
          el.object3D.scale.setScalar(orig.scale);
        });
        try { localStorage.removeItem('blitz-layout'); } catch(e) {}
        cancelReset();
      }

      if (resetBtn) {
        resetBtn.addEventListener('click', function () {
          if (!_pending) {
            // First gaze — ask for confirmation
            _pending = true;
            resetBtn.setAttribute('material', 'color:#552200; emissive:#ff5500; emissiveIntensity:1; shader:flat');
            if (resetLbl) resetLbl.setAttribute('text', 'value: ARE YOU SURE?\nlook again to confirm');
            // Auto-cancel after 6s if user looks away
            _cancelT = setTimeout(cancelReset, 6000);
          } else {
            // Second gaze — confirmed
            doReset();
          }
        });
      }
    });

    function unlockAudio() {
      var ctx = AFRAME.THREE.AudioContext.getContext();
      if (ctx && ctx.state === 'suspended') ctx.resume();
    }
    ['click','touchstart','touchend'].forEach(function(e) {
      document.addEventListener(e, unlockAudio);
    });
    window.addEventListener('load', function() {
      var scene = document.querySelector('a-scene');
      if (scene) scene.addEventListener('enter-vr', unlockAudio);
    });
  </script>
</head>
<body>
<a-scene
  draco-loader
  star-field
  boundary-collider
  vr-placer
  radial-menu
  tool-menu
  fog="type: linear; color: #b0c8e8; near: 60; far: 120"
  renderer="colorManagement: true; antialias: false; physicallyCorrectLights: true; exposure: 1.0"
  shadow="type: basic"
  background="color: #87ceeb">

  <a-assets timeout="90000">
    <a-asset-item id="gatehouse-glb"   src="st_bartholomews_gatehouse.glb"></a-asset-item>
    <a-asset-item id="princelet-glb"   src="4_princelet_street.glb"></a-asset-item>
    <a-asset-item id="blackfriar-glb"  src="the_blackfriar_pub.glb"></a-asset-item>
    <a-asset-item id="factory-glb"          src="victorian_factory.glb"></a-asset-item>
    <a-asset-item id="derelict-factory-glb" src="low_poly_derelict_factory.glb"></a-asset-item>
    <a-asset-item id="victorian-pack-glb"   src="modular_victorian_asset_pack.glb"></a-asset-item>
    <a-asset-item id="brick-wall-glb"          src="low_mixed_dark_bricks_wall.glb"></a-asset-item>
    <a-asset-item id="rubble-glb"              src="construction_rubble.glb"></a-asset-item>
    <a-asset-item id="old-lamp-glb"            src="old_street_lamp.glb"></a-asset-item>
    <a-asset-item id="antique-shop-glb"        src="antique_shop_compressed.glb"></a-asset-item>
    <a-asset-item id="victorian-fence-glb"     src="victorian_fence_c.glb"></a-asset-item>
    <a-asset-item id="victorian-street-glb"    src="victorian_street_scene_c.glb"></a-asset-item>
    <a-asset-item id="gunnersbury-arch-glb"    src="gunnersbury_arch.glb"></a-asset-item>
  </a-assets>

  <!-- ═══ LIGHTING — TEMP DAYLIGHT ═══ -->
  <a-light type="ambient" color="#ffffff" intensity="1.2"></a-light>
  <a-light type="hemisphere" color="#87ceeb" groundColor="#8B7355" intensity="1.0"></a-light>
  <a-light type="directional" color="#ffffff" intensity="1.8"
           position="-5 20 10"></a-light>
  <a-light type="point" color="#ff7722" intensity="0.7" distance="50" decay="1.4"
           position="0 3 -50" fire-flicker></a-light>

  <!-- ═══ GROUND ═══ -->
  <a-plane position="0 0 -45" rotation="-90 0 0" width="120" height="120"
           material="color:#1a1810; roughness:0.95; metalness:0"></a-plane>

  <a-sky color="#87ceeb"></a-sky>

  <!-- ═══ DAY / NIGHT toggle button ═══ -->
  <a-entity position="1.0 0 -33">
    <a-box width="0.07" height="1.1" depth="0.07" position="0 0.55 0"
           material="color:#223344; shader:flat"></a-box>
    <a-box class="btn" id="night-btn"
           width="0.4" height="0.22" depth="0.14" position="0 1.15 0"
           material="color:#112233; emissive:#0055cc; emissiveIntensity:1; shader:flat">
    </a-box>
    <a-text id="night-label" value="DAY / NIGHT" position="0 1.42 0" align="center"
            color="#88ccff" width="2.5" material="shader:flat"></a-text>
    <a-text value="(look 1.5s)" position="0 1.27 0" align="center"
            color="#445566" width="1.8" material="shader:flat"></a-text>
    <a-text id="version-label" value="" position="0 1.12 0" align="center"
            color="#334455" width="1.6" material="shader:flat"></a-text>
  </a-entity>

  <!-- ═══ VISITOR MODE button — switches to walk/test mode ═══ -->
  <a-entity position="2.6 0 -33">
    <a-box width="0.07" height="1.1" depth="0.07" position="0 0.55 0"
           material="color:#223322; shader:flat"></a-box>
    <a-box class="btn" id="visitor-btn"
           width="0.4" height="0.22" depth="0.14" position="0 1.15 0"
           material="color:#112211; emissive:#225500; emissiveIntensity:1; shader:flat">
    </a-box>
    <a-text id="visitor-lbl" value="VISITOR MODE" position="0 1.42 0" align="center"
            color="#aaffaa" width="2.5" material="shader:flat"></a-text>
    <a-text value="(look 1.5s)" position="0 1.27 0" align="center"
            color="#445566" width="1.8" material="shader:flat"></a-text>
    <a-text id="visitor-sub" value="BUILD" position="0 1.12 0" align="center"
            color="#556644" width="1.6" material="shader:flat"></a-text>
  </a-entity>

  <!-- ═══ RESET MAP button — two-step confirmation ═══ -->
  <a-entity position="1.8 0 -33">
    <a-box width="0.07" height="1.1" depth="0.07" position="0 0.55 0"
           material="color:#223344; shader:flat"></a-box>
    <!-- stage 1: normal state -->
    <a-box class="btn" id="reset-btn"
           width="0.4" height="0.22" depth="0.14" position="0 1.15 0"
           material="color:#221111; emissive:#aa1111; emissiveIntensity:1; shader:flat">
    </a-box>
    <a-text id="reset-lbl" value="RESET MAP" position="0 1.4 0" align="center"
            color="#ffaaaa" width="2.5" material="shader:flat"></a-text>
    <a-text value="(look 1.5s)" position="0 1.02 0" align="center"
            color="#445566" width="2" material="shader:flat"></a-text>
  </a-entity>

  <!-- ═══ SPAWN MARKER — shows exactly where the player loads in ═══ -->
  <!-- Left foot -->
  <a-box position="-0.11 0.005 -33.08" width="0.09" height="0.01" depth="0.22"
         material="color:#ffffff; emissive:#ffffff; emissiveIntensity:0.6; shader:flat; opacity:0.55; transparent:true"></a-box>
  <!-- Right foot -->
  <a-box position=" 0.11 0.005 -33.08" width="0.09" height="0.01" depth="0.22"
         material="color:#ffffff; emissive:#ffffff; emissiveIntensity:0.6; shader:flat; opacity:0.55; transparent:true"></a-box>
  <!-- Forward arrow — points in the direction the player faces on load -->
  <a-text value="▲" position="0 0.01 -32.6" rotation="-90 0 0"
          color="#ffffff" width="0.8" align="center"
          material="shader:flat; opacity:0.4; transparent:true"></a-text>

  <!-- ── Controls card — grabbable, starts on the wall to the left of spawn ── -->
  <!-- Grab with right grip laser like any building. Hold it up to read. -->
  <!-- Controls card — A5 portrait, grabbable, hanging left of spawn -->
  <a-entity class="placeable" data-name="controls-card" id="controls-card"
            position="-1.0 1.2 -34.5" rotation="0 15 0">
    <a-plane width="0.21" height="0.30"
             material="color:#f5f0e8; shader:flat; side:double"></a-plane>
    <!-- single text block, baseline top, tight wrap -->
    <a-text
      value="— CONTROLS —

RIGHT HAND
Grip: laser on / select
+ Trigger: move building
L-Stick: nudge 10 cm
R-Stick L/R: spin
R-Stick U/D: scale
Stick click: tool menu
A: floor snap
A x2: lock / unlock

BOTH GRIPS
R-Stick: tilt building
A: snap to level

LEFT HAND
Trigger hold: spawn wheel
  Stick: pick item
  Release: spawn it
  Stick click: next page
Grip + Stick U/D: height
Stick click: undo
X + R.Grip: reset pos
Y: save / export

WORLD
Blue post: day / night
Green post: visitor mode"
      position="-0.093 0.138 0.002"
      align="left"
      baseline="top"
      width="0.19"
      wrap-count="22"
      color="#222222"
      material="shader:flat">
    </a-text>
  </a-entity>

  <!-- ═══ BUILDINGS — spawned via left-trigger radial wheel menu ═══ -->
  <!-- No staged entities needed. Radial wheel creates fresh copies from assets. -->

  <!-- ═══ PLAYER ═══
       Spawns at ground zero, looking toward the buildings. -->
  <a-entity id="rig" position="0 0 -33"
            movement-controls="fly: false; speed: 0.8; camera: #cam">
    <a-entity id="cam" camera look-controls position="0 1.6 0">
      <!-- Gaze cursor: look at .btn objects for 1.5s to activate -->
      <a-cursor fuse="true" fuse-timeout="1500"
                raycaster="objects: .btn; far: 20; interval: 200"
                material="color:#ffffff; shader:flat; opacity:0"
                geometry="primitive: ring; radiusInner: 0; radiusOuter: 0"
                position="0 0 -1">
      </a-cursor>
    </a-entity>

    <a-entity oculus-touch-controls="hand: left">
      <a-text value="X: markers"    position="0.032 0.018 -0.052" rotation="-50 0 0" color="#ffee44" width="0.16" align="left"></a-text>
      <a-text value="Y: export pos" position="-0.012 0.038 -0.052" rotation="-50 0 0" color="#44ffaa" width="0.16" align="left"></a-text>
      <a-text value="trigger: clear" position="0.018 0.008 -0.082" rotation="-20 0 0" color="#ff8888" width="0.16" align="left"></a-text>
      <a-text value="stick: move"   position="-0.01 0.048 -0.032" rotation="-70 0 0" color="#88aaff" width="0.16" align="left"></a-text>
    </a-entity>

    <a-entity oculus-touch-controls="hand: right">
      <a-text value="A: ref mark"    position="0.032 0.008 -0.052" rotation="-50 0 0" color="#ffaa44" width="0.16" align="left"></a-text>
      <a-text class="lbl-b" value="B: fly" position="-0.012 0.038 -0.052" rotation="-50 0 0" color="#88ff88" width="0.16" align="left"></a-text>
      <a-text value="stick↓: capture" position="0.018 0.008 -0.082" rotation="-20 0 0" color="#ff8888" width="0.16" align="left"></a-text>
      <a-text value="stick: move"    position="-0.01 0.048 -0.032" rotation="-70 0 0" color="#88aaff" width="0.16" align="left"></a-text>
    </a-entity>
  </a-entity>

</a-scene>
</body>
</html>
