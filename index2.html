<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackout Alley — London, 1940</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>

  <!-- Draco decoder — needed to parse Draco-compressed GLB files. -->
  <script>
    AFRAME.registerComponent('draco-loader', {
      init: function () {
        var dracoLoader = new THREE.DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
        var gltfSystem = this.el.systems['gltf-model'];
        if (gltfSystem && gltfSystem.loader) {
          gltfSystem.loader.setDRACOLoader(dracoLoader);
        }
      }
    });
  </script>

  <script>
    AFRAME.registerComponent('fire-flicker', {
      schema: { min: { default: 0.6 }, max: { default: 1.6 }, chance: { default: 0.08 } },
      tick: function () {
        if (Math.random() < this.data.chance) {
          var v = this.data.min + Math.random() * (this.data.max - this.data.min);
          this.el.setAttribute('light', 'intensity', v);
        }
      }
    });

    // Star field — THREE.js points scattered in dome above scene
    AFRAME.registerComponent('star-field', {
      schema: { count: { type: 'int', default: 800 } },
      init: function () {
        var geo = new THREE.BufferGeometry();
        var pos = [];
        var n = this.data.count;
        for (var i = 0; i < n; i++) {
          var theta = Math.random() * Math.PI * 2;
          var phi   = Math.random() * Math.PI * 0.45;
          var r     = 80 + Math.random() * 30;
          pos.push(
            r * Math.sin(phi) * Math.cos(theta),
            r * Math.cos(phi) + 10,
            r * Math.sin(phi) * Math.sin(theta) - 40
          );
        }
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        var mat = new THREE.PointsMaterial({
          color: 0xc8d8ff, size: 0.28, sizeAttenuation: true,
          transparent: true, opacity: 0.85
        });
        this.el.sceneEl.object3D.add(new THREE.Points(geo, mat));
      }
    });

    // No-op kept so attribute doesn't throw if still present on entities
    AFRAME.registerComponent('victorian-night', { init: function () {} });

    // ── NIGHT TINT ───────────────────────────────────────────────────────
    // Photogrammetry GLBs have daylight baked into their textures — scene
    // lighting alone can't darken them. This component multiplies every
    // material's colour down after load, giving a genuine night appearance.
    // 'brightness' (0–1): how dark. 0.12 ≈ deep night. 'blue' adds moonlight tint.
    AFRAME.registerComponent('night-tint', {
      schema: { brightness: { default: 0.12 }, blue: { default: 1.25 } },
      init: function () {
        var data = this.data;
        this.el.addEventListener('model-loaded', function () {
          this.el.object3D.traverse(function (node) {
            if (!node.isMesh) return;
            var mats = Array.isArray(node.material) ? node.material : [node.material];
            mats.forEach(function (mat) {
              mat.color.r *= data.brightness * 0.85;
              mat.color.g *= data.brightness * 0.9;
              mat.color.b *= data.brightness * data.blue;
              if (mat.emissive) {
                mat.emissive.r *= 0.05;
                mat.emissive.g *= 0.05;
                mat.emissive.b *= 0.05;
              }
            });
          });
        }.bind(this));
      }
    });

    // ── GROUND CLAMP (raycast) ───────────────────────────────────────────
    // Casts a 5×5 grid of rays downward through the model's footprint.
    // Collects every intersection Y, sorts them, and uses the 10th-percentile
    // value as "floor level" — robust against stray low geometry or floating
    // debris that fools a plain bounding-box min.
    AFRAME.registerComponent('ground-clamp', {
      init: function () {
        var el = this.el;
        el.addEventListener('model-loaded', function () {
          requestAnimationFrame(function () {
            el.object3D.position.y = 0;

            // Bounding box gives us the footprint to sample across
            var box = new THREE.Box3().setFromObject(el.object3D);
            if (box.isEmpty()) return;

            // Gather all meshes
            var meshes = [];
            el.object3D.traverse(function (node) {
              if (node.isMesh) meshes.push(node);
            });
            if (meshes.length === 0) return;

            // Cast a 5×5 grid of rays downward through the footprint
            var raycaster = new THREE.Raycaster();
            var dir = new THREE.Vector3(0, -1, 0);
            var hitYs = [];
            var steps = 5;
            for (var xi = 0; xi < steps; xi++) {
              for (var zi = 0; zi < steps; zi++) {
                var x = box.min.x + (box.max.x - box.min.x) * (xi / (steps - 1));
                var z = box.min.z + (box.max.z - box.min.z) * (zi / (steps - 1));
                raycaster.set(new THREE.Vector3(x, box.max.y + 5, z), dir);
                var hits = raycaster.intersectObjects(meshes, false);
                hits.forEach(function (h) { hitYs.push(h.point.y); });
              }
            }

            var floorY;
            if (hitYs.length > 0) {
              // 10th percentile — ignores stray low geometry
              hitYs.sort(function (a, b) { return a - b; });
              floorY = hitYs[Math.floor(hitYs.length * 0.10)];
            } else {
              // Fallback: plain bounding box min
              floorY = box.min.y;
            }

            el.object3D.position.y = -floorY;
          });
        });
      }
    });

    // ── COORD CAPTURE ───────────────────────────────────────────────────
    // Right thumbstick click : capture controller XYZ (up to 5, listed on HUD)
    // Left trigger            : clear list + hide HUD
    // X button (left)         : toggle calibration marker sticks
    // B button (right)        : toggle fly mode
    // A button (right)        : drop a 3 m XYZ reference marker at controller position
    AFRAME.registerComponent('coord-capture', {
      init: function () {
        var self = this;
        self.coords = [];
        self.markersVisible = false;

        this.el.sceneEl.addEventListener('loaded', function () {
          var cam = document.querySelector('#cam');

          // HUD panel — hidden until first capture
          var panel = document.createElement('a-plane');
          panel.setAttribute('position', '0.34 -0.30 -0.5');
          panel.setAttribute('width', '0.58');
          panel.setAttribute('height', '0.42');
          panel.setAttribute('material', 'color:#000000; opacity:0.84; transparent:true; shader:flat');
          panel.setAttribute('visible', 'false');
          cam.appendChild(panel);
          self.panel = panel;

          var hud = document.createElement('a-entity');
          hud.setAttribute('position', '0.07 -0.16 -0.49');
          hud.setAttribute('text', 'value: ; color:#44ff88; align:left; width:0.76');
          hud.setAttribute('visible', 'false');
          cam.appendChild(hud);
          self.hud = hud;

          function fmt(n) { return (n >= 0 ? ' ' : '') + n.toFixed(3); }
          function showHud() {
            self.panel.setAttribute('visible', 'true');
            self.hud.setAttribute('visible', 'true');
          }
          function hideHud() {
            self.panel.setAttribute('visible', 'false');
            self.hud.setAttribute('visible', 'false');
          }
          function updateHud() {
            var lines = self.coords.map(function (p, i) {
              return '#' + (i + 1) + '  X:' + fmt(p.x) + '  Y:' + fmt(p.y) + '  Z:' + fmt(p.z);
            }).join('\n');
            lines += '\n';
            lines += self.coords.length < 5 ? 'RIGHT:+capture  LEFT:hide+clear' : 'LEFT: hide+clear';
            self.hud.setAttribute('text', 'value', lines);
          }

          // ── Calibration marker sticks every 3 m along Z axis ──────────
          var markersEl = document.createElement('a-entity');
          markersEl.setAttribute('id', 'cal-markers');
          markersEl.setAttribute('visible', 'false');
          self.el.sceneEl.appendChild(markersEl);

          var matY    = 'color:#ffdd00; emissive:#ffaa00; emissiveIntensity:0.9; shader:flat';
          var matX    = 'color:#ff4444; emissive:#ff2200; emissiveIntensity:0.9; shader:flat';
          var matZ    = 'color:#4488ff; emissive:#2244ff; emissiveIntensity:0.9; shader:flat';
          var matTick = 'color:#ffffff; emissive:#ffffff; emissiveIntensity:1; shader:flat';

          for (var z = 0; z >= -60; z -= 3) {
            var stickY = document.createElement('a-box');
            stickY.setAttribute('position', '0 1 ' + z);
            stickY.setAttribute('width', '0.06'); stickY.setAttribute('height', '2'); stickY.setAttribute('depth', '0.06');
            stickY.setAttribute('material', matY);
            markersEl.appendChild(stickY);

            // Height tick at 1.73 m (5'8")
            var tick = document.createElement('a-box');
            tick.setAttribute('position', '0 1.73 ' + z);
            tick.setAttribute('width', '0.28'); tick.setAttribute('height', '0.04'); tick.setAttribute('depth', '0.04');
            tick.setAttribute('material', matTick);
            markersEl.appendChild(tick);
            var tickLbl = document.createElement('a-text');
            tickLbl.setAttribute('value', "5'8\"");
            tickLbl.setAttribute('position', '0.18 1.73 ' + z);
            tickLbl.setAttribute('color', '#ffffff');
            tickLbl.setAttribute('width', '2');
            tickLbl.setAttribute('align', 'left');
            markersEl.appendChild(tickLbl);

            var armX = document.createElement('a-box');
            armX.setAttribute('position', '0 1 ' + z);
            armX.setAttribute('width', '2'); armX.setAttribute('height', '0.06'); armX.setAttribute('depth', '0.06');
            armX.setAttribute('material', matX);
            markersEl.appendChild(armX);

            var armZ = document.createElement('a-box');
            armZ.setAttribute('position', '0 1 ' + z);
            armZ.setAttribute('width', '0.06'); armZ.setAttribute('height', '0.06'); armZ.setAttribute('depth', '2');
            armZ.setAttribute('material', matZ);
            markersEl.appendChild(armZ);

            var lbl = document.createElement('a-text');
            lbl.setAttribute('value', 'Z=' + z + 'm');
            lbl.setAttribute('position', '0.12 2.2 ' + z);
            lbl.setAttribute('color', '#ffee44');
            lbl.setAttribute('width', '3');
            lbl.setAttribute('align', 'left');
            markersEl.appendChild(lbl);
          }

          // ── Controller wiring ──────────────────────────────────────────
          var rightCtrl = document.querySelector('[oculus-touch-controls*="right"]');
          var leftCtrl  = document.querySelector('[oculus-touch-controls*="left"]');
          var rigEl     = document.querySelector('#rig');
          var flying    = false;

          if (rightCtrl) {
            rightCtrl.addEventListener('thumbstickdown', function () {
              if (self.coords.length >= 5) return;
              var p = new THREE.Vector3();
              rightCtrl.object3D.getWorldPosition(p);
              self.coords.push({ x: p.x, y: p.y, z: p.z });
              showHud();
              updateHud();
            });

            rightCtrl.addEventListener('bbuttondown', function () {
              flying = !flying;
              if (flying) {
                rigEl.setAttribute('movement-controls', 'fly: true; speed: 1.5; camera: #cam');
              } else {
                rigEl.setAttribute('movement-controls', 'fly: false; speed: 0.8; camera: #cam');
                rigEl.object3D.position.y = 0;
              }
              var bLbl = rightCtrl.querySelector('.lbl-b');
              if (bLbl) bLbl.setAttribute('text', 'value', flying ? 'B: land' : 'B: fly');
            });

            rightCtrl.addEventListener('abuttondown', function () {
              var p = new THREE.Vector3();
              rightCtrl.object3D.getWorldPosition(p);
              var marker = document.createElement('a-entity');
              marker.setAttribute('position', p.x + ' ' + p.y + ' ' + p.z);
              var aY = document.createElement('a-box');
              aY.setAttribute('position', '0 0 0');
              aY.setAttribute('width', '0.05'); aY.setAttribute('height', '3'); aY.setAttribute('depth', '0.05');
              aY.setAttribute('material', 'color:#00ff44; emissive:#00cc33; emissiveIntensity:1; shader:flat');
              marker.appendChild(aY);
              var aX = document.createElement('a-box');
              aX.setAttribute('position', '0 0 0');
              aX.setAttribute('width', '3'); aX.setAttribute('height', '0.05'); aX.setAttribute('depth', '0.05');
              aX.setAttribute('material', 'color:#ff2222; emissive:#ff0000; emissiveIntensity:1; shader:flat');
              marker.appendChild(aX);
              var aZ = document.createElement('a-box');
              aZ.setAttribute('position', '0 0 0');
              aZ.setAttribute('width', '0.05'); aZ.setAttribute('height', '0.05'); aZ.setAttribute('depth', '3');
              aZ.setAttribute('material', 'color:#2244ff; emissive:#0022ff; emissiveIntensity:1; shader:flat');
              marker.appendChild(aZ);
              var dot = document.createElement('a-sphere');
              dot.setAttribute('radius', '0.08');
              dot.setAttribute('material', 'color:#ffffff; emissive:#ffffff; emissiveIntensity:1; shader:flat');
              marker.appendChild(dot);
              self.el.sceneEl.appendChild(marker);
            });
          }

          if (leftCtrl) {
            leftCtrl.addEventListener('triggerdown', function () {
              self.coords = [];
              hideHud();
            });
            leftCtrl.addEventListener('xbuttondown', function () {
              self.markersVisible = !self.markersVisible;
              markersEl.setAttribute('visible', self.markersVisible ? 'true' : 'false');
            });
          }
        });
      }
    });
  </script>

  <script>
    // ── VR PLACER ────────────────────────────────────────────────────────
    // Right GRIP              : laser on + select building
    // Right GRIP + TRIGGER    : move selected building (smooth)
    // Right STICK L/R         : spin building
    // Left  STICK U/D         : scale building
    // Left  STICK click       : undo last move
    // Left  GRIP (alone)      : stamp 5'8" height post
    // Left  GRIP (while R gripping): reset building to original position
    // Left  Y                 : export positions + copy to clipboard
    AFRAME.registerComponent('vr-placer', {
      init: function () {
        var self = this;
        self.held       = null;
        self.gripping   = false;
        self.moving     = false;
        self.stickX     = 0;  // LEFT stick X  → spin
        self.heightY    = 0;  // LEFT stick Y  → push into / pull out of ground
        self.scaleY     = 0;  // RIGHT stick Y → scale
        self.raycaster      = new THREE.Raycaster();
        self.leftRaycaster  = new THREE.Raycaster();
        self.tmpQuat        = new THREE.Quaternion();
        self.groundPt       = new THREE.Vector3();
        self.laserPivot     = null;   // right-hand laser
        self.leftLaserPivot = null;   // left-hand laser (height control)
        self.hovered        = null;
        self.leftHovered    = null;
        self.leftGripping   = false;
        self.history        = [];
        self.originals      = {};
        self.bboxCache      = {};
        self.bboxKeys       = [];
        self.frameCount     = 0;
        self.cloneCounts       = {};
        self.nightMode         = false;
        self._playerRotLock    = null; // locks rig Y rotation while gripping
        self._rigEl            = null; // cached in scene loaded
        self._rightCtrlEl      = null; // cached for direct gamepad polling
        // Pre-allocate tick vectors — never new() inside tick
        self._tickOrigin  = new THREE.Vector3();
        self._tickDir     = new THREE.Vector3();
        self._tickDist    = new THREE.Vector3();
        self._tmpBox      = new THREE.Box3();
        self._leftOrigin  = new THREE.Vector3();
        self._leftDir     = new THREE.Vector3();
        self._leftDist    = new THREE.Vector3();
        self._leftQuat    = new THREE.Quaternion();

        this.el.sceneEl.addEventListener('loaded', function () {
          var cam       = document.querySelector('#cam');
          var rigEl     = document.querySelector('#rig');
          self._rigEl   = rigEl;
          var rightCtrl = document.querySelector('[oculus-touch-controls*="right"]');
          self._rightCtrlEl = rightCtrl;
          var leftCtrl  = document.querySelector('[oculus-touch-controls*="left"]');

          // ── Store originals + build bbox cache after models settle ──
          function rebuildBbox(el) {
            var id  = el.getAttribute('data-name');
            var box = new THREE.Box3().setFromObject(el.object3D);
            self.bboxCache[id] = { el: el, box: box, lastPos: el.object3D.position.clone() };
            // Keep flat array in sync — tick uses this instead of Object.keys each frame
            self.bboxKeys = Object.keys(self.bboxCache);
          }
          // Rebuild cache when any model finishes loading
          document.querySelectorAll('.placeable').forEach(function (el) {
            el.addEventListener('model-loaded', function () {
              requestAnimationFrame(function () { rebuildBbox(el); });
            });
          });
          requestAnimationFrame(function () {
            document.querySelectorAll('.placeable').forEach(function (el) {
              var id = el.getAttribute('data-name');
              var p  = el.object3D.position;
              self.originals[id] = {
                x: p.x, y: p.y, z: p.z,
                rotY: el.object3D.rotation.y,
                scale: el.object3D.scale.x
              };
              rebuildBbox(el);
            });
            window._placerOriginals = self.originals; // exposed for reset button
          });

          // ── Laser pivot — tilted 45° down ────────────────────────
          var laserPivot = document.createElement('a-entity');
          laserPivot.setAttribute('rotation', '-45 0 0');
          laserPivot.setAttribute('visible', 'false');
          var laser = document.createElement('a-box');
          laser.setAttribute('width',  '0.005');
          laser.setAttribute('height', '0.005');
          laser.setAttribute('depth',  '20');
          laser.setAttribute('position', '0 0 -10');
          laser.setAttribute('material', 'color:#00ffcc; emissive:#00ffcc; emissiveIntensity:1; shader:flat; opacity:0.6; transparent:true');
          laserPivot.appendChild(laser);
          if (rightCtrl) rightCtrl.appendChild(laserPivot);
          self.laser      = laser;
          self.laserPivot = laserPivot;

          // ── Left laser pivot — orange, for height control ────────────
          var leftLaserPivot = document.createElement('a-entity');
          leftLaserPivot.setAttribute('rotation', '-45 0 0');
          leftLaserPivot.setAttribute('visible', 'false');
          var leftLaser = document.createElement('a-box');
          leftLaser.setAttribute('width',  '0.005');
          leftLaser.setAttribute('height', '0.005');
          leftLaser.setAttribute('depth',  '20');
          leftLaser.setAttribute('position', '0 0 -10');
          leftLaser.setAttribute('material', 'color:#ff8800; emissive:#ff6600; emissiveIntensity:1; shader:flat; opacity:0.7; transparent:true');
          leftLaserPivot.appendChild(leftLaser);
          if (leftCtrl) leftCtrl.appendChild(leftLaserPivot);
          self.leftLaserPivot = leftLaserPivot;

          // ── Output HUD ──────────────────────────────────────────
          var outPanel = document.createElement('a-plane');
          outPanel.setAttribute('position', '0 0.08 -0.6');
          outPanel.setAttribute('width',  '1.1');
          outPanel.setAttribute('height', '0.72');
          outPanel.setAttribute('material', 'color:#000811; opacity:0.92; transparent:true; shader:flat');
          outPanel.setAttribute('visible', 'false');
          cam.appendChild(outPanel);

          var outText = document.createElement('a-entity');
          outText.setAttribute('position', '-0.52 0.42 -0.59');
          outText.setAttribute('text', 'value: ; color:#44ffaa; align:left; width:1.1; wrapCount:52');
          outText.setAttribute('visible', 'false');
          cam.appendChild(outText);

          // ── Live readout — shows Y offset + scale while adjusting ───
          var readout = document.createElement('a-entity');
          readout.setAttribute('position', '0 -0.18 -0.55');
          readout.setAttribute('text', 'value: ; color:#ffdd44; align:center; width:1.4');
          readout.setAttribute('visible', 'false');
          cam.appendChild(readout);
          self.readout = readout;
          self.readoutTimer = 0;
          self.outPanel = outPanel;
          self.outText  = outText;

          // ── Right controller ─────────────────────────────────────
          if (rightCtrl) {
            rightCtrl.addEventListener('gripdown', function () {
              self.gripping = true;
              laserPivot.setAttribute('visible', 'true');
              // Lock rig rotation so right stick can't spin the player
              if (rigEl) self._playerRotLock = rigEl.object3D.rotation.y;
              try { if (rigEl) rigEl.setAttribute('movement-controls', 'fly: false; speed: 0; camera: #cam'); } catch(e) {}
              if (self.hovered) {
                self.history.push({
                  el:    self.hovered,
                  x:     self.hovered.object3D.position.x,
                  z:     self.hovered.object3D.position.z,
                  rotY:  self.hovered.object3D.rotation.y,
                  scale: self.hovered.object3D.scale.x
                });
                self.held = self.hovered;
              }
            });

            rightCtrl.addEventListener('gripup', function () {
              self.gripping = false;
              self.moving   = false;
              self.held     = null;
              self.stickX   = 0;
              self.heightY  = 0;
              self.scaleY   = 0;
              laserPivot.setAttribute('visible', 'false');
              self._playerRotLock = null;
              try { if (rigEl) rigEl.setAttribute('movement-controls', 'fly: false; speed: 0.8; camera: #cam'); } catch(e) {}
            });

            rightCtrl.addEventListener('triggerdown', function () {
              if (self.gripping && self.held) self.moving = true;
            });
            rightCtrl.addEventListener('triggerup', function () {
              self.moving = false;
            });

            rightCtrl.addEventListener('thumbstickmoved', function (e) {
              self.stickX = e.detail.x;  // right stick X → spin (only active while gripping)
              self.scaleY = e.detail.y;  // right stick Y → scale
            });
          }

          // ── Left controller ──────────────────────────────────────
          if (leftCtrl) {
            leftCtrl.addEventListener('thumbstickmoved', function (e) {
              self.heightY = e.detail.y;  // left stick Y → height only (dedicated axis, no spin bleed)
            });

            // Left stick CLICK → undo last move
            leftCtrl.addEventListener('thumbstickdown', function () {
              if (self.history.length === 0) return;
              var last = self.history.pop();
              last.el.object3D.position.x  = last.x;
              last.el.object3D.position.z  = last.z;
              last.el.object3D.rotation.y  = last.rotY;
              last.el.object3D.scale.setScalar(last.scale);
            });

            // Left GRIP — show left laser for height control
            leftCtrl.addEventListener('gripdown', function () {
              self.leftGripping = true;
              self.leftLaserPivot.setAttribute('visible', 'true');
            });
            leftCtrl.addEventListener('gripup', function () {
              self.leftGripping = false;
              self.leftHovered  = null;
              self.leftLaserPivot.setAttribute('visible', 'false');
            });

            // Left X — stamp improved reference post  OR  reset held building
            leftCtrl.addEventListener('xbuttondown', function () {
              if (self.gripping && self.held) {
                // Reset to original position
                var id   = self.held.getAttribute('data-name');
                var orig = self.originals[id];
                if (orig) {
                  self.held.object3D.position.x = orig.x;
                  self.held.object3D.position.z = orig.z;
                  self.held.object3D.rotation.y = orig.rotY;
                  self.held.object3D.scale.setScalar(orig.scale);
                }
              } else {
                // Stamp reference post at left-controller position
                var wp = new THREE.Vector3();
                leftCtrl.object3D.getWorldPosition(wp);
                var post = document.createElement('a-entity');
                post.setAttribute('position', wp.x + ' 0 ' + wp.z);

                // Main pole — 6m, white
                var pole = document.createElement('a-box');
                pole.setAttribute('width', '0.04'); pole.setAttribute('height', '6'); pole.setAttribute('depth', '0.04');
                pole.setAttribute('position', '0 3 0');
                pole.setAttribute('material', 'color:#cccccc; emissive:#aaaaaa; emissiveIntensity:0.6; shader:flat; opacity:0.9; transparent:true');
                post.appendChild(pole);

                // Floor base ring
                var base = document.createElement('a-torus');
                base.setAttribute('radius', '0.3'); base.setAttribute('radius-tubular', '0.02');
                base.setAttribute('rotation', '-90 0 0');
                base.setAttribute('position', '0 0.01 0');
                base.setAttribute('material', 'color:#00ffcc; emissive:#00ffcc; emissiveIntensity:1; shader:flat');
                post.appendChild(base);

                // Metre markers with labels
                var marks = [
                  { y: 1,   color: '#ffee44', label: '1m' },
                  { y: 2.1, color: '#ff8844', label: '2.1m  door' },
                  { y: 3,   color: '#ff4444', label: '3m  1st floor' },
                  { y: 4.5, color: '#ff88ff', label: '4.5m' },
                  { y: 6,   color: '#88aaff', label: '6m  2nd floor' }
                ];
                marks.forEach(function (m) {
                  var bar = document.createElement('a-box');
                  bar.setAttribute('width', '0.6'); bar.setAttribute('height', '0.03'); bar.setAttribute('depth', '0.03');
                  bar.setAttribute('position', '0.3 ' + m.y + ' 0');
                  bar.setAttribute('material', 'color:' + m.color + '; emissive:' + m.color + '; emissiveIntensity:0.9; shader:flat');
                  post.appendChild(bar);
                  var txt = document.createElement('a-text');
                  txt.setAttribute('value', m.label);
                  txt.setAttribute('position', '0.65 ' + m.y + ' 0');
                  txt.setAttribute('color', m.color);
                  txt.setAttribute('width', '2.5');
                  txt.setAttribute('align', 'left');
                  txt.setAttribute('material', 'shader:flat');
                  post.appendChild(txt);
                });

                self.el.sceneEl.appendChild(post);
              }
            });

            // Y button — export positions + copy to clipboard
            leftCtrl.addEventListener('ybuttondown', function () {
              var vis = outPanel.getAttribute('visible');
              if (vis === 'true' || vis === true) {
                outPanel.setAttribute('visible', 'false');
                outText.setAttribute('visible',  'false');
                return;
              }
              var lines = '── PASTE INTO HTML ──\n';
              document.querySelectorAll('.placeable').forEach(function (el) {
                var p  = el.object3D.position;
                var sc = el.object3D.scale.x.toFixed(3);
                var ry = Math.round(THREE.MathUtils.radToDeg(el.object3D.rotation.y));
                var id = el.getAttribute('data-name') || '?';
                lines += id + '\n';
                lines += 'pos="' + p.x.toFixed(2) + ' 0 ' + p.z.toFixed(2) + '"\n';
                lines += 'rot="0 ' + ry + ' 0"\n';
                lines += 'scale="' + sc + ' ' + sc + ' ' + sc + '"\n\n';
              });
              outText.setAttribute('text', 'value', lines);
              outPanel.setAttribute('visible', 'true');
              outText.setAttribute('visible',  'true');
              // Auto-copy to clipboard + save to localStorage
              if (navigator.clipboard) navigator.clipboard.writeText(lines).catch(function(){});
              try {
                var layout = {};
                document.querySelectorAll('.placeable').forEach(function (el) {
                  var id2 = el.getAttribute('data-name');
                  var p2  = el.object3D.position;
                  layout[id2] = { x: p2.x, y: p2.y, z: p2.z, rotY: el.object3D.rotation.y, scale: el.object3D.scale.x };
                });
                localStorage.setItem('blitz-layout', JSON.stringify(layout));
              } catch (e) {}
            });

            // X button — lock / unlock the hovered or held building
            leftCtrl.addEventListener('xbuttondown', function () {
              var target = self.held || self.hovered;
              if (!target) return;
              var id    = target.getAttribute('data-name');
              var entry = self.locked[id];
              if (!entry) return;
              entry.state = !entry.state;
              entry.icon.setAttribute('visible', entry.state ? 'true' : 'false');
              // If we just locked the held building, release it
              if (entry.state && self.held === target) {
                self.gripping = false;
                self.moving   = false;
                self.held     = null;
                self.stickX   = 0;
                laserPivot.setAttribute('visible', 'false');
              }
            });
          }

          // ── Helpers ──────────────────────────────────────────────────
          // Attach label + lock icon to a placeable entity and register it
          function decoratePlaceable(el) {
            var name = el.getAttribute('data-name') || '';
            if (!name) return;

            var lbl = document.createElement('a-text');
            lbl.setAttribute('value', name);
            lbl.setAttribute('position', '0 8 0');
            lbl.setAttribute('align', 'center');
            lbl.setAttribute('color', '#ffee88');
            lbl.setAttribute('width', '12');
            lbl.setAttribute('material', 'shader:flat');
            el.appendChild(lbl);

            var lockIcon = document.createElement('a-entity');
            lockIcon.setAttribute('position', '0 10 0');
            lockIcon.setAttribute('visible', 'false');
            var lockBody = document.createElement('a-box');
            lockBody.setAttribute('width', '0.6'); lockBody.setAttribute('height', '0.5'); lockBody.setAttribute('depth', '0.3');
            lockBody.setAttribute('material', 'color:#ff3333; emissive:#ff2222; emissiveIntensity:1; shader:flat');
            var lockLbl = document.createElement('a-text');
            lockLbl.setAttribute('value', 'LOCKED');
            lockLbl.setAttribute('position', '0 -0.6 0');
            lockLbl.setAttribute('align', 'center');
            lockLbl.setAttribute('color', '#ff3333');
            lockLbl.setAttribute('width', '5');
            lockLbl.setAttribute('material', 'shader:flat');
            lockIcon.appendChild(lockBody);
            lockIcon.appendChild(lockLbl);
            el.appendChild(lockIcon);
            self.locked[name] = { el: el, icon: lockIcon, state: false };
          }

          // Clone a held building and immediately hold the copy
          function cloneHeld() {
            if (!self.held) return;
            var srcName = self.held.getAttribute('data-name');
            self.cloneCounts[srcName] = (self.cloneCounts[srcName] || 0) + 1;
            var newName = srcName + '-' + self.cloneCounts[srcName];

            var clone = document.createElement('a-entity');
            clone.setAttribute('class', 'placeable');
            clone.setAttribute('data-name', newName);
            clone.setAttribute('gltf-model', self.held.getAttribute('gltf-model'));
            var p = self.held.object3D.position;
            var sc = self.held.object3D.scale.x;
            clone.setAttribute('position', (p.x + 4) + ' ' + p.y + ' ' + p.z);
            clone.setAttribute('scale', sc + ' ' + sc + ' ' + sc);

            clone.addEventListener('model-loaded', function () {
              requestAnimationFrame(function () { rebuildBbox(clone); });
            });
            decoratePlaceable(clone);
            self.el.sceneEl.appendChild(clone);

            // Hand off hold to the clone
            self.history.push({ el: clone, x: p.x + 4, y: p.y, z: p.z, rotY: 0, scale: sc });
            self.held = clone;
          }

          // ── Floating name labels + lock indicators ────────────────────
          document.querySelectorAll('.placeable').forEach(function (el) {
            decoratePlaceable(el);
          });

          // ── localStorage: load saved layout ──────────────────────────
          try {
            var saved = JSON.parse(localStorage.getItem('blitz-layout'));
            if (saved) {
              document.querySelectorAll('.placeable').forEach(function (el) {
                var id = el.getAttribute('data-name');
                var d  = saved[id];
                if (!d) return;
                el.addEventListener('model-loaded', function () {
                  requestAnimationFrame(function () {
                    el.object3D.position.set(d.x, d.y || 0, d.z);
                    el.object3D.rotation.y = d.rotY || 0;
                    el.object3D.scale.setScalar(d.scale);
                  });
                }, { once: true });
              });
            }
          } catch (e) {}

          // Left trigger is free — night toggle is on the physical world button

          // ── Right A: floor snap | Right thumbstick click: clone ───────
          if (rightCtrl) {
            rightCtrl.addEventListener('abuttondown', function () {
              if (self.held) self.held.object3D.position.y = 0;
            });
            rightCtrl.addEventListener('thumbstickdown', function () {
              cloneHeld();
            });
          }

        });
      },

      tick: function () {
        if (!this.laserPivot) return;
        this.frameCount++;

        // Lock rig Y rotation every frame while gripping — prevents movement-controls
        // from applying right-stick turn while the user is spinning a building
        if (this._playerRotLock !== null && this._rigEl) {
          this._rigEl.object3D.rotation.y = this._playerRotLock;
        }

        try {

        // ── Hover: bbox check every 12 frames — always on so hovered is
        // ready the instant grip fires (laser invisible but ray still runs)
        if (this.frameCount % 12 === 0) {
          this.laserPivot.object3D.getWorldPosition(this._tickOrigin);
          this.laserPivot.object3D.getWorldQuaternion(this.tmpQuat);
          this._tickDir.set(0, 0, -1).applyQuaternion(this.tmpQuat).normalize();
          this.raycaster.set(this._tickOrigin, this._tickDir);

          var newHovered = null;
          var bestDist   = Infinity;
          var keys       = this.bboxKeys;
          var cache      = this.bboxCache;
          var origin     = this._tickOrigin;
          var dist       = this._tickDist;
          var tmpBox     = this._tmpBox;
          for (var i = 0; i < keys.length; i++) {
            var entry = cache[keys[i]];
            if (!entry || !entry.el) continue;
            var cur   = entry.el.object3D.position;
            var last  = entry.lastPos;
            tmpBox.copy(entry.box);
            tmpBox.min.x += cur.x - last.x; tmpBox.min.z += cur.z - last.z;
            tmpBox.max.x += cur.x - last.x; tmpBox.max.z += cur.z - last.z;
            if (this.raycaster.ray.intersectBox(tmpBox, dist) !== null) {
              var d = origin.distanceTo(dist);
              if (d < bestDist) { bestDist = d; newHovered = entry.el; }
            }
          }
          this.hovered = newHovered;
        }

        if (!this.held) { } else {

        // ── Move: grip + trigger ────────────────────────────────────────
        if (this.moving) {
          this.laserPivot.object3D.getWorldPosition(this._tickOrigin);
          this.laserPivot.object3D.getWorldQuaternion(this.tmpQuat);
          this._tickDir.set(0, 0, -1).applyQuaternion(this.tmpQuat).normalize();
          if (this._tickDir.y < -0.001) {
            var t = -this._tickOrigin.y / this._tickDir.y;
            if (t > 0.3) {
              this.groundPt.copy(this._tickOrigin).addScaledVector(this._tickDir, t);
              this.held.object3D.position.x += (this.groundPt.x - this.held.object3D.position.x) * 0.07;
              this.held.object3D.position.z += (this.groundPt.z - this.held.object3D.position.z) * 0.07;
            }
          }
        }

        // ── Poll gamepad directly — events miss held positions ─────────
        if (this.gripping && this._rightCtrlEl) {
          var tc = this._rightCtrlEl.components['tracked-controls-webxr'] ||
                   this._rightCtrlEl.components['tracked-controls'];
          var gp = tc && tc.controller && tc.controller.gamepad;
          if (gp && gp.axes.length >= 4) {
            this.stickX = gp.axes[2];
            this.scaleY = gp.axes[3];
          }
        }

        // ── Spin — right stick X ────────────────────────────────────────
        if (Math.abs(this.stickX) > 0.15) {
          this.held.object3D.rotation.y += this.stickX * 0.055;
        }

        // ── Scale — right stick Y: up = bigger, down = smaller ─────────
        var adjusting = false;
        if (Math.abs(this.scaleY) > 0.15) {
          var ns = Math.max(0.02, this.held.object3D.scale.x + this.scaleY * 0.002);
          this.held.object3D.scale.setScalar(ns);
          adjusting = true;
        }

        // ── Live scale readout ───────────────────────────────────────────
        if (this.readout) {
          if (adjusting) { this.readoutTimer = 90; }
          if (this.readoutTimer > 0) {
            this.readoutTimer--;
            if (this.frameCount % 6 === 0) {
              this.readout.setAttribute('text', 'value', 'scale  ' + this.held.object3D.scale.x.toFixed(3));
              this.readout.setAttribute('visible', 'true');
            }
          } else {
            this.readout.setAttribute('visible', 'false');
          }
        }

        } // end if (this.held)

        // ── Left laser hover + height control ──────────────────────────
        // Entirely independent of right hand — can raise ANY building.
        if (this.leftLaserPivot && this.leftGripping && this.frameCount % 12 === 0) {
          this.leftLaserPivot.object3D.getWorldPosition(this._leftOrigin);
          this.leftLaserPivot.object3D.getWorldQuaternion(this._leftQuat);
          this._leftDir.set(0, 0, -1).applyQuaternion(this._leftQuat).normalize();
          this.leftRaycaster.set(this._leftOrigin, this._leftDir);

          var leftBest = Infinity;
          var leftNew  = null;
          var lkeys    = this.bboxKeys;
          var lcache   = this.bboxCache;
          var lbox     = this._tmpBox;  // safe: only 1 loop runs per frame
          for (var li = 0; li < lkeys.length; li++) {
            var lentry = lcache[lkeys[li]];
            if (!lentry || !lentry.el) continue;
            var lcur  = lentry.el.object3D.position;
            var llast = lentry.lastPos;
            lbox.copy(lentry.box);
            lbox.min.x += lcur.x - llast.x; lbox.min.z += lcur.z - llast.z;
            lbox.max.x += lcur.x - llast.x; lbox.max.z += lcur.z - llast.z;
            if (this.leftRaycaster.ray.intersectBox(lbox, this._leftDist) !== null) {
              var ld = this._leftOrigin.distanceTo(this._leftDist);
              if (ld < leftBest) { leftBest = ld; leftNew = lentry.el; }
            }
          }
          this.leftHovered = leftNew;
        }

        // Height adjust: left stick Y moves whatever left laser points at
        if (this.leftGripping && this.leftHovered && Math.abs(this.heightY) > 0.15) {
          this.leftHovered.object3D.position.y += this.heightY * 0.007;
          // Show Y offset in readout
          if (this.readout && this.frameCount % 6 === 0) {
            var hy  = this.leftHovered.object3D.position.y.toFixed(2);
            var hlb = parseFloat(hy) >= 0 ? '+' + hy : hy;
            this.readout.setAttribute('text', 'value', 'floor offset  ' + hlb + ' m');
            this.readout.setAttribute('visible', 'true');
            this.readoutTimer = 60;
          }
        }

        } catch (e) { console.error('vr-placer tick error:', e); }
      }
    });
  </script>

  <script>
    // Shared day/night toggle — called by both the world button and left trigger
    window._nightMode = false;
    window.toggleNight = function () {
      window._nightMode = !window._nightMode;
      var scene  = document.querySelector('a-scene');
      var sky    = document.querySelector('a-sky');
      var btn    = document.querySelector('#night-btn');
      if (window._nightMode) {
        if (sky) sky.setAttribute('color', '#020408');
        scene.setAttribute('fog', 'type: linear; color: #050810; near: 20; far: 70');
        scene.setAttribute('renderer', 'colorManagement: true; antialias: false; physicallyCorrectLights: true; exposure: 0.08');
        if (btn) btn.setAttribute('material', 'color:#330800; emissive:#cc3300; emissiveIntensity:1; shader:flat');
      } else {
        if (sky) sky.setAttribute('color', '#87ceeb');
        scene.setAttribute('fog', 'type: linear; color: #b0c8e8; near: 60; far: 120');
        scene.setAttribute('renderer', 'colorManagement: true; antialias: false; physicallyCorrectLights: true; exposure: 1.0');
        if (btn) btn.setAttribute('material', 'color:#112233; emissive:#0055cc; emissiveIntensity:1; shader:flat');
      }
    };

    // Wire up buttons (gaze fuse fires 'click')
    document.addEventListener('DOMContentLoaded', function () {
      // Night toggle
      var nightBtn = document.querySelector('#night-btn');
      if (nightBtn) nightBtn.addEventListener('click', window.toggleNight);

      // Reset map — two-gaze confirmation
      var resetBtn  = document.querySelector('#reset-btn');
      var resetLbl  = document.querySelector('#reset-lbl');
      var _pending  = false;
      var _cancelT  = null;

      function cancelReset() {
        _pending = false;
        clearTimeout(_cancelT);
        if (resetBtn) resetBtn.setAttribute('material', 'color:#221111; emissive:#aa1111; emissiveIntensity:1; shader:flat');
        if (resetLbl) resetLbl.setAttribute('text', 'value: RESET MAP');
      }

      function doReset() {
        var originals = window._placerOriginals || {};
        document.querySelectorAll('.placeable').forEach(function (el) {
          var id   = el.getAttribute('data-name');
          var orig = originals[id];
          if (!orig) return;
          el.object3D.position.set(orig.x, orig.y || 0, orig.z);
          el.object3D.rotation.y = orig.rotY || 0;
          el.object3D.scale.setScalar(orig.scale);
        });
        try { localStorage.removeItem('blitz-layout'); } catch(e) {}
        cancelReset();
      }

      if (resetBtn) {
        resetBtn.addEventListener('click', function () {
          if (!_pending) {
            // First gaze — ask for confirmation
            _pending = true;
            resetBtn.setAttribute('material', 'color:#552200; emissive:#ff5500; emissiveIntensity:1; shader:flat');
            if (resetLbl) resetLbl.setAttribute('text', 'value: ARE YOU SURE?\nlook again to confirm');
            // Auto-cancel after 6s if user looks away
            _cancelT = setTimeout(cancelReset, 6000);
          } else {
            // Second gaze — confirmed
            doReset();
          }
        });
      }
    });

    function unlockAudio() {
      var ctx = AFRAME.THREE.AudioContext.getContext();
      if (ctx && ctx.state === 'suspended') ctx.resume();
    }
    ['click','touchstart','touchend'].forEach(function(e) {
      document.addEventListener(e, unlockAudio);
    });
    window.addEventListener('load', function() {
      var scene = document.querySelector('a-scene');
      if (scene) scene.addEventListener('enter-vr', unlockAudio);
    });
  </script>
</head>
<body>
<a-scene
  draco-loader
  coord-capture
  star-field
  vr-placer
  fog="type: linear; color: #b0c8e8; near: 60; far: 120"
  renderer="colorManagement: true; antialias: false; physicallyCorrectLights: true; exposure: 1.0"
  shadow="type: basic"
  background="color: #87ceeb">

  <a-assets timeout="90000">
    <a-asset-item id="gatehouse-glb"   src="st_bartholomews_gatehouse.glb"></a-asset-item>
    <a-asset-item id="princelet-glb"   src="4_princelet_street.glb"></a-asset-item>
    <a-asset-item id="blackfriar-glb"  src="the_blackfriar_pub.glb"></a-asset-item>
    <a-asset-item id="factory-glb"     src="victorian_factory.glb"></a-asset-item>
  </a-assets>

  <!-- ═══ LIGHTING — TEMP DAYLIGHT ═══ -->

  <a-light type="hemisphere" color="#87ceeb" groundColor="#8B7355" intensity="1.0"></a-light>

           position="-5 20 10"></a-light>
  <a-light type="point" color="#ff7722" intensity="0.7" distance="50" decay="1.4"
           position="0 3 -50" fire-flicker></a-light>

  <!-- ═══ GROUND ═══ -->
  <a-plane position="30 0 -45" rotation="-90 0 0" width="240" height="160"
           material="color:#1a1810; roughness:0.95; metalness:0"></a-plane>

  <a-sky color="#87ceeb"></a-sky>

  <!-- ═══ DAY / NIGHT toggle button ═══ -->
  <a-entity position="5.5 0 -33">
    <a-box width="0.07" height="1.1" depth="0.07" position="0 0.55 0"
           material="color:#223344; shader:flat"></a-box>
    <a-box class="btn" id="night-btn"
           width="0.4" height="0.22" depth="0.14" position="0 1.15 0"
           material="color:#112233; emissive:#0055cc; emissiveIntensity:1; shader:flat">
    </a-box>
    <a-text value="DAY / NIGHT" position="0 1.4 0" align="center"
            color="#88ccff" width="2.5" material="shader:flat"></a-text>
    <a-text value="(look 1.5s)" position="0 1.02 0" align="center"
            color="#445566" width="2" material="shader:flat"></a-text>
  </a-entity>

  <!-- ═══ RESET MAP button — two-step confirmation ═══ -->
  <a-entity position="8.2 0 -33">
    <a-box width="0.07" height="1.1" depth="0.07" position="0 0.55 0"
           material="color:#223344; shader:flat"></a-box>
    <!-- stage 1: normal state -->
    <a-box class="btn" id="reset-btn"
           width="0.4" height="0.22" depth="0.14" position="0 1.15 0"
           material="color:#221111; emissive:#aa1111; emissiveIntensity:1; shader:flat">
    </a-box>
    <a-text id="reset-lbl" value="RESET MAP" position="0 1.4 0" align="center"
            color="#ffaaaa" width="2.5" material="shader:flat"></a-text>
    <a-text value="(look 1.5s)" position="0 1.02 0" align="center"
            color="#445566" width="2" material="shader:flat"></a-text>
  </a-entity>

  <!-- ═══ GROUND ZERO marker — glowing ring at spawn reference point ═══ -->
  <a-torus position="0 0.02 -33" rotation="-90 0 0" radius="1.2" radius-tubular="0.04"
           material="color:#00ffcc; emissive:#00ffcc; emissiveIntensity:1; shader:flat; opacity:0.7; transparent:true">
  </a-torus>
  <a-text value="GROUND ZERO" position="0 0.05 -31.6" rotation="-90 0 0"
          color="#00ffcc" width="4" align="center"
          material="shader:flat"></a-text>

  <!-- ── Compass rose — flat on ground around ground zero ── -->
  <a-torus position="0 0.01 -33" rotation="-90 0 0" radius="3.5" radius-tubular="0.03"
           material="color:#334455; emissive:#223344; emissiveIntensity:0.5; shader:flat; opacity:0.6; transparent:true"></a-torus>
  <a-text value="N" position="0 0.02 -36.6"  rotation="-90 0 0" color="#ff4444" width="3" align="center" material="shader:flat"></a-text>
  <a-text value="S" position="0 0.02 -29.4"  rotation="-90 0 0" color="#ff4444" width="3" align="center" material="shader:flat"></a-text>
  <a-text value="E" position="3.6 0.02 -33"  rotation="-90 0 0" color="#aaaaff" width="3" align="center" material="shader:flat"></a-text>
  <a-text value="W" position="-3.6 0.02 -33" rotation="-90 0 0" color="#aaaaff" width="3" align="center" material="shader:flat"></a-text>
  <!-- Tick lines at cardinal points -->
  <a-box position="0 0.02 -36.5"  rotation="-90 0 0"   width="0.08" height="0.5" depth="0.02" material="color:#ff4444; shader:flat"></a-box>
  <a-box position="0 0.02 -29.5"  rotation="-90 0 0"   width="0.08" height="0.5" depth="0.02" material="color:#ff4444; shader:flat"></a-box>
  <a-box position="3.5 0.02 -33"  rotation="-90 0 90"  width="0.08" height="0.5" depth="0.02" material="color:#aaaaff; shader:flat"></a-box>
  <a-box position="-3.5 0.02 -33" rotation="-90 0 90"  width="0.08" height="0.5" depth="0.02" material="color:#aaaaff; shader:flat"></a-box>

  <!-- ── Controls board — small, flat on the ground beside the ring ── -->
  <a-plane position="2.2 0.02 -33" rotation="-90 0 0" width="2.2" height="2.8"
           material="color:#000a06; opacity:0.85; transparent:true; shader:flat"></a-plane>
  <a-text value="── RIGHT HAND ──&#10;GRIP          laser on / select&#10;+ TRIGGER     move building&#10;STICK L/R     spin&#10;STICK U/D     scale (up=big)&#10;STICK CLICK   clone&#10;A             snap to floor&#10;B             fly&#10;&#10;── LEFT HAND ──&#10;GRIP          laser on / raise-lower&#10;STICK U/D     raise / lower height&#10;STICK CLICK   undo&#10;X             reference post&#10;X + R.GRIP    reset building&#10;Y             save + export&#10;&#10;── WORLD ──&#10;DAY/NIGHT btn gaze 1.5s"
          position="2.2 0.03 -33" rotation="-90 0 -0"
          color="#aaffdd" width="2.0" align="left" wrap-count="28"
          material="shader:flat"></a-text>

  <!-- ═══ BUILDINGS — drag with right grip to place, Y button to export ═══ -->
  <!-- Gatehouse straight ahead on load. Others staged to the right. -->
  <a-entity class="placeable" data-name="gatehouse" id="b-gatehouse"
    gltf-model="#gatehouse-glb"
    position="0 0 -45" rotation="0 0 0" scale="0.232 0.232 0.232">
  </a-entity>

  <a-entity class="placeable" data-name="blackfriar" id="b-blackfriar"
    gltf-model="#blackfriar-glb"
    position="20 0 -45" rotation="0 0 0" scale="0.694 0.694 0.694">
  </a-entity>

  <a-entity class="placeable" data-name="princelet" id="b-princelet"
    gltf-model="#princelet-glb"
    position="40 0 -45" rotation="0 0 0" scale="1.404 1.404 1.404">
  </a-entity>

  <a-entity class="placeable" data-name="factory" id="b-factory"
    gltf-model="#factory-glb"
    position="60 0 -45" rotation="0 0 0" scale="0.771 0.771 0.771">
  </a-entity>

  <!-- fence + antique shop removed — too large, cause Quest memory issues -->
  </a-entity>

  <!-- ═══ PLAYER ═══
       Spawns at ground zero, looking toward the buildings. -->
  <a-entity id="rig" position="0 0 -33"
            movement-controls="fly: false; speed: 0.8; camera: #cam">
    <a-entity id="cam" camera look-controls position="0 1.6 0">
      <!-- Gaze cursor: look at .btn objects for 1.5s to activate -->
      <a-cursor fuse="true" fuse-timeout="1500"
                raycaster="objects: .btn; far: 20; interval: 200"
                material="color:#ffffff; shader:flat; opacity:0"
                geometry="primitive: ring; radiusInner: 0; radiusOuter: 0"
                position="0 0 -1">
      </a-cursor>
    </a-entity>

    <a-entity oculus-touch-controls="hand: left">
      <a-text value="X: markers"    position="0.032 0.018 -0.052" rotation="-50 0 0" color="#ffee44" width="0.16" align="left"></a-text>
      <a-text value="Y: export pos" position="-0.012 0.038 -0.052" rotation="-50 0 0" color="#44ffaa" width="0.16" align="left"></a-text>
      <a-text value="trigger: clear" position="0.018 0.008 -0.082" rotation="-20 0 0" color="#ff8888" width="0.16" align="left"></a-text>
      <a-text value="stick: move"   position="-0.01 0.048 -0.032" rotation="-70 0 0" color="#88aaff" width="0.16" align="left"></a-text>
    </a-entity>

    <a-entity oculus-touch-controls="hand: right">
      <a-text value="A: ref mark"    position="0.032 0.008 -0.052" rotation="-50 0 0" color="#ffaa44" width="0.16" align="left"></a-text>
      <a-text class="lbl-b" value="B: fly" position="-0.012 0.038 -0.052" rotation="-50 0 0" color="#88ff88" width="0.16" align="left"></a-text>
      <a-text value="stick↓: capture" position="0.018 0.008 -0.082" rotation="-20 0 0" color="#ff8888" width="0.16" align="left"></a-text>
      <a-text value="stick: move"    position="-0.01 0.048 -0.032" rotation="-70 0 0" color="#88aaff" width="0.16" align="left"></a-text>
    </a-entity>
  </a-entity>

</a-scene>
</body>
</html>
