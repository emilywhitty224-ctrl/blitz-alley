<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackout Alley — London, 1940</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.4.0/dist/aframe-extras.min.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; background: #000; }
    #loading-overlay {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      color: #ffee88; font: 14px monospace; background: rgba(0,0,0,0.6);
      padding: 4px 12px; border-radius: 4px; pointer-events: none; z-index: 99;
    }
  </style>

  <script>
    // Suppress unhandled rejections — these kill Quest WebXR sessions
    window.addEventListener('unhandledrejection', function (e) {
      e.preventDefault();
      console.warn('[safety] rejection suppressed:', e.reason);
    });
    window.onerror = function (msg, src, line) {
      console.warn('[error]', msg, src + ':' + line);
      return false;
    };
  </script>

  <script>
    // ── Torch flicker — random light intensity variation ──────────────────
    AFRAME.registerComponent('torch-flicker', {
      schema: { base: {default: 0.9}, range: {default: 0.35}, speed: {default: 8} },
      init: function () { this._t = 0; this._target = 1; this._cur = 1; },
      tick: function (t, dt) {
        this._t += dt * 0.001 * this.data.speed;
        if (this._t >= 1) {
          this._t = 0;
          this._target = this.data.base + (Math.random() - 0.5) * this.data.range * 2;
        }
        this._cur += (this._target - this._cur) * Math.min(1, dt * 0.012);
        this.el.setAttribute('light', 'intensity', Math.max(0, this._cur));
      }
    });

    // ── Night-aware — darkens GLB materials in night mode ─────────────────
    window._nightAware = [];
    AFRAME.registerComponent('night-aware', {
      schema: { brightness: {default: 0.13}, blueBoost: {default: 1.25} },
      init: function () {
        var self = this;
        self._origColors = [];
        self._ready = false;
        function cacheColors() {
          self._origColors = [];
          self.el.object3D.traverse(function (node) {
            if (!node.isMesh) return;
            var mats = Array.isArray(node.material) ? node.material : [node.material];
            mats.forEach(function (mat) {
              self._origColors.push({
                mat: mat,
                r: mat.color.r, g: mat.color.g, b: mat.color.b,
                er: mat.emissive ? mat.emissive.r : 0,
                eg: mat.emissive ? mat.emissive.g : 0,
                eb: mat.emissive ? mat.emissive.b : 0
              });
            });
          });
          if (self._origColors.length === 0) return;
          self._ready = true;
          self.applyNight(true); // always night mode
        }
        self.el.addEventListener('model-loaded', cacheColors);
        setTimeout(function () { if (!self._ready) cacheColors(); }, 500);
        setTimeout(function () { if (!self._ready) cacheColors(); }, 2000);
        window._nightAware.push(self);
      },
      applyNight: function (on) {
        if (!this._ready) return;
        var br = this.data.brightness, bl = this.data.blueBoost;
        this._origColors.forEach(function (c) {
          if (on) {
            c.mat.color.r = c.r * br * 0.85;
            c.mat.color.g = c.g * br * 0.9;
            c.mat.color.b = c.b * br * bl;
            if (c.mat.emissive) {
              c.mat.emissive.r = c.er * 0.05;
              c.mat.emissive.g = c.eg * 0.05;
              c.mat.emissive.b = c.eb * 0.05;
            }
          } else {
            c.mat.color.r = c.r; c.mat.color.g = c.g; c.mat.color.b = c.b;
            if (c.mat.emissive) {
              c.mat.emissive.r = c.er; c.mat.emissive.g = c.eg; c.mat.emissive.b = c.eb;
            }
          }
          c.mat.needsUpdate = true;
        });
      },
      remove: function () {
        var i = window._nightAware.indexOf(this);
        if (i !== -1) window._nightAware.splice(i, 1);
      }
    });

    // ── Snap turn — right thumbstick, 45° per click ───────────────────────
    AFRAME.registerComponent('snap-turn', {
      init: function () {
        var rig = this.el;
        var _cooldown = false;
        function bind() {
          var rightCtrl = document.querySelector('[oculus-touch-controls*="right"]');
          if (!rightCtrl) { setTimeout(bind, 500); return; }
          rightCtrl.addEventListener('thumbstickmoved', function (e) {
            if (_cooldown || Math.abs(e.detail.x) < 0.7) return;
            rig.object3D.rotation.y += THREE.MathUtils.degToRad(e.detail.x > 0 ? -45 : 45);
            _cooldown = true;
            setTimeout(function () { _cooldown = false; }, 350);
          });
        }
        bind();
      }
    });

    // ── Torch toggle — right A button ────────────────────────────────────
    AFRAME.registerComponent('torch-toggle', {
      init: function () {
        var _on = true;
        function bind() {
          var rightCtrl = document.querySelector('[oculus-touch-controls*="right"]');
          if (!rightCtrl) { setTimeout(bind, 500); return; }
          rightCtrl.addEventListener('abuttondown', function () {
            try {
              _on = !_on;
              var torch = document.querySelector('#torch');
              if (torch) torch.setAttribute('visible', _on ? 'true' : 'false');
            } catch(e) {}
          });
        }
        bind();
      }
    });

    // ── Audio context unlock (Quest requires a user gesture) ─────────────
    ['click','touchstart','touchend'].forEach(function (ev) {
      document.addEventListener(ev, function () {
        var ctx = AFRAME.THREE.AudioContext.getContext();
        if (ctx && ctx.state === 'suspended') ctx.resume();
      });
    });
  </script>
</head>
<body>

<a-scene
  fog="type: linear; color: #010306; near: 4; far: 16"
  renderer="colorManagement: true; antialias: false; physicallyCorrectLights: true; exposure: 0.08"
  vr-mode-ui="enabled: true"
  loading-screen="dotsColor: #ffee88; backgroundColor: #000">

  <a-assets timeout="90000">
    <img id="night-sky-img" src="night_sky.jpg" crossorigin="anonymous">
    <a-asset-item id="gatehouse-glb"          src="st_bartholomews_gatehouse.glb"></a-asset-item>
    <a-asset-item id="princelet-glb"          src="4_princelet_street.glb"></a-asset-item>
    <a-asset-item id="blackfriar-glb"         src="the_blackfriar_pub.glb"></a-asset-item>
    <a-asset-item id="factory-glb"            src="victorian_factory.glb"></a-asset-item>
    <a-asset-item id="derelict-factory-glb"   src="low_poly_derelict_factory.glb"></a-asset-item>
    <a-asset-item id="victorian-pack-glb"     src="modular_victorian_asset_pack.glb"></a-asset-item>
    <a-asset-item id="brick-wall-glb"         src="low_mixed_dark_bricks_wall.glb"></a-asset-item>
    <a-asset-item id="rubble-glb"             src="construction_rubble.glb"></a-asset-item>
    <a-asset-item id="old-lamp-glb"           src="old_street_lamp.glb"></a-asset-item>
    <a-asset-item id="antique-shop-glb"       src="antique_shop_compressed.glb"></a-asset-item>
    <a-asset-item id="victorian-fence-glb"    src="victorian_fence_c.glb"></a-asset-item>
    <a-asset-item id="victorian-street-glb"   src="victorian_street_scene_c.glb"></a-asset-item>
    <a-asset-item id="gunnersbury-arch-glb"   src="gunnersbury_arch.glb"></a-asset-item>
  </a-assets>

  <!-- ═══ LIGHTING — NIGHT / BLACKOUT ═══ -->
  <a-light type="ambient"     color="#ffffff" intensity="0.02"></a-light>
  <a-light type="hemisphere"  color="#87ceeb" groundColor="#8B7355" intensity="0"></a-light>
  <a-light type="directional" color="#ffffff" intensity="0" position="-5 20 10"></a-light>
  <!-- Distant fire glow at far end of alley -->
  <a-light type="point" color="#ff7722" intensity="0.7" distance="50" decay="1.4"
           position="0 3 -50"></a-light>

  <!-- ═══ GROUND ═══ -->
  <a-plane position="0 0 -45" rotation="-90 0 0" width="120" height="120"
           material="color:#1a1810; roughness:0.95; metalness:0"></a-plane>

  <!-- ═══ SKY ═══ -->
  <a-sky id="sky" src="#night-sky-img" color="#ffffff"></a-sky>

  <!-- ═══ LOADING COUNTER ═══ -->
  <a-entity position="0 2.3 -34" id="loading-counter-wrapper">
    <a-text id="loading-counter" value="Loading…" align="center" width="4"
            material="shader:flat; emissive:#ffee88; emissiveIntensity:0.5; opacity:0.85; transparent:true">
    </a-text>
  </a-entity>

  <!-- ═══ PLAYER ═══ -->
  <a-entity id="rig" position="0 0 -33"
            movement-controls="fly: false; speed: 0.2; camera: #cam"
            snap-turn>
    <a-entity id="cam" camera look-controls position="0 1.6 0">
      <!-- Bounce fill: simulates torch light bounced off nearby walls/floor -->
      <a-entity light="type:point; color:#ff6600; intensity:0.12; distance:6; decay:1" position="0 -0.4 0"></a-entity>
      <!-- Moonlight: faint cool rim on upward-facing surfaces -->
      <a-entity light="type:directional; color:#8899cc; intensity:0.04" position="0.3 1 -0.2"></a-entity>
    </a-entity>

    <a-entity oculus-touch-controls="hand: left; model: false"></a-entity>

    <a-entity oculus-touch-controls="hand: right; model: false"
              torch-toggle>
      <!-- Carried torch -->
      <a-entity id="torch" position="0 0.05 -0.08" rotation="40 0 0">
        <a-cylinder radius="0.018" height="0.28"
                    material="color:#3b1f0a; roughness:0.9; metalness:0"></a-cylinder>
        <a-cylinder radius="0.022" height="0.015"
                    material="color:#1a0d00; roughness:0.8; metalness:0.1"
                    position="0 0.08 0"></a-cylinder>
        <a-cylinder radius="0.022" height="0.015"
                    material="color:#1a0d00; roughness:0.8; metalness:0.1"
                    position="0 -0.05 0"></a-cylinder>
        <a-cylinder radius="0.028" height="0.07"
                    material="color:#1a1005; roughness:1; metalness:0"
                    position="0 0.175 0"></a-cylinder>
        <a-sphere radius="0.04"
                  material="color:#ff6600; emissive:#ff4400; emissiveIntensity:1; shader:flat; transparent:true; opacity:0.9"
                  position="0 0.225 0"></a-sphere>
        <a-sphere radius="0.022"
                  material="color:#ffdd44; emissive:#ffcc00; emissiveIntensity:1; shader:flat; transparent:true; opacity:0.85"
                  position="0 0.232 0"></a-sphere>
        <a-entity light="type:point; color:#ff8822; intensity:0.9; distance:9; decay:1"
                  torch-flicker="base:0.9; range:0.35; speed:9"
                  position="0 0.24 0"></a-entity>
      </a-entity>
    </a-entity>
  </a-entity>

</a-scene>

<script>
  // ── Sequential staged spawn — staggered to avoid GPU OOM on Quest ────────
  var _STAGED = [
    { name:'gatehouse-0',    src:'#gatehouse-glb',        scale:0.232, x:-60, nightBr:0.06 },
    { name:'blackfriar-0',   src:'#blackfriar-glb',       scale:0.694, x:-50 },
    { name:'princelet-0',    src:'#princelet-glb',        scale:1.404, x:-40 },
    { name:'factory-0',      src:'#factory-glb',          scale:0.771, x:-30 },
    { name:'derelict-fac-0', src:'#derelict-factory-glb', scale:1.0,   x:-20 },
    { name:'vic-pack-0',     src:'#victorian-pack-glb',   scale:1.0,   x:-10 },
    { name:'brick-wall-0',   src:'#brick-wall-glb',       scale:1.0,   x:0   },
    { name:'rubble-0',       src:'#rubble-glb',           scale:1.0,   x:10  },
    { name:'old-lamp-0',     src:'#old-lamp-glb',         scale:1.0,   x:20  },
    { name:'antique-shop-0', src:'#antique-shop-glb',     scale:1.0,   x:30  },
    { name:'vic-fence-0',    src:'#victorian-fence-glb',  scale:1.0,   x:40  },
    { name:'vic-street-0',   src:'#victorian-street-glb', scale:1.0,   x:50  },
    { name:'arch-0',         src:'#gunnersbury-arch-glb', scale:1.0,   x:60  }
  ];
  var _stageDone = 0;

  function _spawnNext(i) {
    if (i >= _STAGED.length) return;
    var d = _STAGED[i];
    var e = document.createElement('a-entity');
    e.setAttribute('data-name', d.name);
    e.setAttribute('gltf-model', d.src);
    e.setAttribute('night-aware', d.nightBr ? 'brightness:' + d.nightBr : '');
    e.setAttribute('position', d.x + ' 0 -50');
    var s = d.scale;
    e.setAttribute('scale', s + ' ' + s + ' ' + s);
    e.addEventListener('model-loaded', function () {
      _stageDone++;
      var lc = document.querySelector('#loading-counter');
      if (lc) {
        if (_stageDone >= _STAGED.length) {
          lc.setAttribute('value', 'Ready \u2713');
          setTimeout(function () {
            var w = document.querySelector('#loading-counter-wrapper');
            if (w) w.setAttribute('visible', 'false');
          }, 2000);
        } else {
          lc.setAttribute('value', 'Loading ' + _stageDone + ' / ' + _STAGED.length + '\u2026');
        }
      }
      setTimeout(function () { _spawnNext(i + 1); }, 200);
    });
    e.addEventListener('model-error', function () {
      _stageDone++;
      setTimeout(function () { _spawnNext(i + 1); }, 100);
    });
    document.querySelector('a-scene').appendChild(e);
  }

  document.addEventListener('DOMContentLoaded', function () { _spawnNext(0); });
</script>
</body>
</html>
