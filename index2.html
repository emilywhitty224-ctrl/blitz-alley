<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackout Alley — London, 1940</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>
  <script>
    AFRAME.registerComponent('fire-flicker', {
      schema: { min: { default: 0.6 }, max: { default: 1.6 }, chance: { default: 0.08 } },
      tick: function () {
        if (Math.random() < this.data.chance) {
          var v = this.data.min + Math.random() * (this.data.max - this.data.min);
          this.el.setAttribute('light', 'intensity', v);
        }
      }
    });
    // Random distant explosion flash
    AFRAME.registerComponent('explosion-flash', {
      schema: { minGap: { default: 8 }, maxGap: { default: 25 }, duration: { default: 0.12 } },
      init: function () {
        this.timer = 3 + Math.random() * 10;
        this.active = false;
        this.elapsed = 0;
      },
      tick: function (time, dt) {
        var s = dt / 1000;
        if (!this.active) {
          this.timer -= s;
          if (this.timer <= 0) {
            this.active = true;
            this.elapsed = 0;
            this.el.setAttribute('light', 'intensity', 4.0);
            this.timer = this.data.minGap + Math.random() * (this.data.maxGap - this.data.minGap);
          }
        } else {
          this.elapsed += s;
          if (this.elapsed >= this.data.duration) {
            this.active = false;
            this.el.setAttribute('light', 'intensity', 0);
          }
        }
      }
    });

    // Slow upward smoke drift
    AFRAME.registerComponent('smoke-drift', {
      schema: { speed: { default: 0.3 }, range: { default: 6 }, startY: { default: 1 } },
      init: function () {
        this.y = this.data.startY + Math.random() * 3;
        this.el.setAttribute('position', this.el.getAttribute('position').x + ' ' + this.y + ' ' + this.el.getAttribute('position').z);
      },
      tick: function (time, dt) {
        this.y += this.data.speed * (dt / 1000);
        var pos = this.el.getAttribute('position');
        if (this.y > this.data.startY + this.data.range) this.y = this.data.startY;
        this.el.setAttribute('position', pos.x + ' ' + this.y + ' ' + pos.z);
      }
    });

    AFRAME.registerComponent('searchlight-sweep', {
      schema: { swing: { default: 18 }, speed: { default: 0.1 } },
      init: function () { this.t = 0; },
      tick: function (time, dt) {
        this.t += this.data.speed * (dt / 1000);
        this.el.setAttribute('rotation', '72 ' + (Math.sin(this.t) * this.data.swing).toFixed(2) + ' 0');
      }
    });

    // Star field — THREE.js points scattered in dome above alley
    AFRAME.registerComponent('star-field', {
      schema: { count: { type: 'int', default: 700 } },
      init: function () {
        var geo = new THREE.BufferGeometry();
        var pos = [];
        var n = this.data.count;
        for (var i = 0; i < n; i++) {
          var theta = Math.random() * Math.PI * 2;
          var phi   = Math.random() * Math.PI * 0.42;
          var r     = 75 + Math.random() * 25;
          pos.push(
            r * Math.sin(phi) * Math.cos(theta),
            r * Math.cos(phi) + 8,
            r * Math.sin(phi) * Math.sin(theta) - 15
          );
        }
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        var mat = new THREE.PointsMaterial({
          color: 0xc8d8ff, size: 0.28, sizeAttenuation: true,
          transparent: true, opacity: 0.85
        });
        this.el.sceneEl.object3D.add(new THREE.Points(geo, mat));
      }
    });
  </script>
  <script>
    // Unlock AudioContext on first interaction — required by all modern browsers & Quest
    function unlockAudio() {
      var ctx = AFRAME.THREE.AudioContext.getContext();
      if (ctx && ctx.state === 'suspended') ctx.resume();
    }
    ['click','touchstart','touchend'].forEach(function(e) {
      document.addEventListener(e, unlockAudio);
    });
    // Also unlock when entering VR — the headset button counts as an interaction
    window.addEventListener('load', function() {
      var scene = document.querySelector('a-scene');
      if (scene) scene.addEventListener('enter-vr', unlockAudio);
    });
  </script>
</head>
<body>
<a-scene
  fog="type: linear; color: #1a1208; near: 22; far: 55"
  renderer="colorManagement: true; antialias: true; physicallyCorrectLights: true"
  shadow="type: pcfsoft"
  background="color: #060402">

  <a-assets timeout="90000">
    <img id="brick-diff"  src="brown_brick_diffuse.jpg">
    <img id="brick-norm"  src="brown_brick_normal.jpg">
    <img id="brick-rough" src="brown_brick_roughness.jpg">
    <img id="brick-ao"    src="brown_brick_ao.jpg">
    <img id="stone-diff"  src="sandstone_diffuse.jpg">
    <img id="stone-ao"    src="sandstone_ao.jpg">
    <img id="stone-rough" src="Sandstone_Rough.jpg">
    <img id="road-diff"   src="street_diffuse.jpg">
    <img id="road-norm"   src="street_normal.jpg">
    <img id="road-rough"  src="street_roughness.jpg">
    <img id="pub-diff"    src="pub_tile_diffuse.jpg">
    <img id="pub-norm"    src="pub_tile_normal.jpg">
    <img id="pub-rough"   src="pub_tile_roughness.jpg">
    <audio id="blitz-snd" src="blitz.mp3" preload="auto"></audio>
    <a-asset-item id="pubdoors-glb" src="Pubdoors.glb"></a-asset-item>
    <a-asset-item id="barrel-glb"   src="woodenbarrel.glb"></a-asset-item>
    <a-asset-item id="sandbag-glb"  src="Sandbagwall.glb"></a-asset-item>
    <a-asset-item id="rubble-glb"   src="rubble.glb"></a-asset-item>
    <a-asset-item id="lamp-glb"    src="Streetlamp.glb"></a-asset-item>
  </a-assets>

  <a-entity sound="src: #blitz-snd; autoplay: true; loop: true; volume: 0.9; positional: false"></a-entity>

  <!-- ═══ LIGHTING ═══
       Cool blue-grey ambient = moonlight through smoke.
       Fire = warm amber at end, hotter orange-red in side alley.
       Lamps = barely on (blackout). No pure red wash.
  -->
  <a-light type="ambient"     color="#1c2230" intensity="0.28"></a-light>
  <!-- Hemisphere — cool moonlit sky, warm ember ground bounce -->
  <a-light type="hemisphere" color="#2a3550" groundColor="#3a1a08" intensity="0.45"></a-light>
  <a-light type="directional" color="#8090b0" intensity="0.18" position="3 12 8"
           castShadow="true"
           shadow-camera-near="0.5" shadow-camera-far="60"
           shadow-camera-left="-20" shadow-camera-right="20"
           shadow-camera-top="20" shadow-camera-bottom="-20"
           shadow-map-width="2048" shadow-map-height="2048"></a-light>

  <!-- Amber fire glow at pub end -->
  <a-light type="point" color="#ff9933" intensity="1.1" distance="18" decay="2"
           position="0 2.5 -29" fire-flicker></a-light>
  <!-- Hot fire in side alley -->
  <a-light type="point" color="#ff5500" intensity="2.2" distance="20" decay="1.6"
           position="8 2 -25" fire-flicker></a-light>
  <!-- Fire spill into main alley at gap -->
  <a-light type="point" color="#ff7722" intensity="0.9" distance="9" decay="2"
           position="3 1.8 -22" fire-flicker></a-light>
  <!-- Pub interior warmth -->
  <a-light type="point" color="#ffaa55" intensity="1.4" distance="9" decay="2"
           position="0 1.2 -29.4"></a-light>
  <!-- Low ground-level amber at pub step to eliminate black area -->
  <a-light type="point" color="#cc7722" intensity="0.6" distance="4" decay="2"
           position="0 0.2 -29.0"></a-light>
  <!-- Amber window leaking light -->
  <a-light type="point" color="#ff9933" intensity="0.5" distance="4" decay="2"
           position="-1.9 5.0 -7"></a-light>
  <!-- Gas lamp 1 -->
  <a-light type="point" color="#ffcc66" intensity="0.9" distance="7" decay="2"
           position="-1.75 3.1 -10"></a-light>
  <!-- Gas lamp 2 -->
  <a-light type="point" color="#ffcc66" intensity="0.75" distance="6" decay="2"
           position="-1.75 3.1 -22"></a-light>
  <!-- Searchlight -->
  <a-entity position="0 42 -18" searchlight-sweep>
    <a-light type="spot" color="#dde8ff" intensity="1.8" angle="2" penumbra="0.5"
             distance="80" decay="1"></a-light>
  </a-entity>

  <a-sky color="#050402"></a-sky>
  <a-entity star-field="count: 700"></a-entity>

  <!-- ═══════════════════════════════════════════════════════════════
       BOMBERS — Heinkel He 111 silhouettes crossing overhead
       Lancaster-era wingspan ~30m, length ~21m.
       No nav lights (blackout raid). Faint exhaust glow on engines.
       Two aircraft at different altitudes and crossing angles.
  ════════════════════════════════════════════════════════════════ -->

  <!-- Bomber 1 — crossing east to west, Y=52, slow pass -->
  <a-entity
    animation="property: position; from: -80 52 -12; to: 80 52 -18; dur: 52000; loop: true; easing: linear; delay: 0">
    <!-- Fuselage -->
    <a-box position="0 0 0"      width="1.8" height="1.4" depth="20"   color="#030201"></a-box>
    <!-- Port wing -->
    <a-box position="-9 -0.3 2"  width="18"  height="0.5" depth="6"    color="#030201"></a-box>
    <!-- Starboard wing -->
    <a-box position=" 9 -0.3 2"  width="18"  height="0.5" depth="6"    color="#030201"></a-box>
    <!-- Tail horizontal -->
    <a-box position="0  0.4 -9"  width="8"   height="0.4" depth="3"    color="#030201"></a-box>
    <!-- Tail vertical fin -->
    <a-box position="0  1.8 -9"  width="0.4" height="3.5" depth="3.5"  color="#030201"></a-box>
    <!-- Engine nacelles (4) — faint orange exhaust glow -->
    <a-box position="-5  -0.4 2" width="1.2" height="0.9" depth="5.5"  color="#030201"></a-box>
    <a-sphere position="-5 -0.4 5" radius="0.25"
      material="color:#ff5500; emissive:#ff3300; emissiveIntensity:0.4; opacity:0.5; transparent:true"></a-sphere>
    <a-box position="-11 -0.4 2" width="1.2" height="0.9" depth="5.5"  color="#030201"></a-box>
    <a-sphere position="-11 -0.4 5" radius="0.25"
      material="color:#ff5500; emissive:#ff3300; emissiveIntensity:0.4; opacity:0.5; transparent:true"></a-sphere>
    <a-box position=" 5  -0.4 2" width="1.2" height="0.9" depth="5.5"  color="#030201"></a-box>
    <a-sphere position=" 5 -0.4 5" radius="0.25"
      material="color:#ff5500; emissive:#ff3300; emissiveIntensity:0.4; opacity:0.5; transparent:true"></a-sphere>
    <a-box position=" 11 -0.4 2" width="1.2" height="0.9" depth="5.5"  color="#030201"></a-box>
    <a-sphere position=" 11 -0.4 5" radius="0.25"
      material="color:#ff5500; emissive:#ff3300; emissiveIntensity:0.4; opacity:0.5; transparent:true"></a-sphere>
  </a-entity>

  <!-- Bomber 2 — crossing south to north (toward pub end), Y=46, slightly ahead of first -->
  <a-entity
    animation="property: position; from: 8 46 60; to: -4 46 -100; dur: 44000; loop: true; easing: linear; delay: 18000">
    <a-box position="0 0 0"      width="1.8" height="1.4" depth="20"   color="#030201"></a-box>
    <a-box position="-9 -0.3 2"  width="18"  height="0.5" depth="6"    color="#030201"></a-box>
    <a-box position=" 9 -0.3 2"  width="18"  height="0.5" depth="6"    color="#030201"></a-box>
    <a-box position="0  0.4 -9"  width="8"   height="0.4" depth="3"    color="#030201"></a-box>
    <a-box position="0  1.8 -9"  width="0.4" height="3.5" depth="3.5"  color="#030201"></a-box>
    <a-box position="-5  -0.4 2" width="1.2" height="0.9" depth="5.5"  color="#030201"></a-box>
    <a-sphere position="-5 -0.4 5" radius="0.25"
      material="color:#ff5500; emissive:#ff3300; emissiveIntensity:0.35; opacity:0.5; transparent:true"></a-sphere>
    <a-box position="-11 -0.4 2" width="1.2" height="0.9" depth="5.5"  color="#030201"></a-box>
    <a-sphere position="-11 -0.4 5" radius="0.25"
      material="color:#ff5500; emissive:#ff3300; emissiveIntensity:0.35; opacity:0.5; transparent:true"></a-sphere>
    <a-box position=" 5  -0.4 2" width="1.2" height="0.9" depth="5.5"  color="#030201"></a-box>
    <a-sphere position=" 5 -0.4 5" radius="0.25"
      material="color:#ff5500; emissive:#ff3300; emissiveIntensity:0.35; opacity:0.5; transparent:true"></a-sphere>
    <a-box position=" 11 -0.4 2" width="1.2" height="0.9" depth="5.5"  color="#030201"></a-box>
    <a-sphere position=" 11 -0.4 5" radius="0.25"
      material="color:#ff5500; emissive:#ff3300; emissiveIntensity:0.35; opacity:0.5; transparent:true"></a-sphere>
  </a-entity>

  <!-- Bomber 3 — distant, smaller, angled crossing Z=-5 area Y=62 -->
  <a-entity
    animation="property: position; from: 60 62 -5; to: -60 62 -22; dur: 68000; loop: true; easing: linear; delay: 6000">
    <a-box position="0 0 0"      width="1.4" height="1.0" depth="15"   color="#020100"></a-box>
    <a-box position="-7 -0.2 2"  width="14"  height="0.4" depth="5"    color="#020100"></a-box>
    <a-box position=" 7 -0.2 2"  width="14"  height="0.4" depth="5"    color="#020100"></a-box>
    <a-box position="0  0.3 -7"  width="6"   height="0.3" depth="2.5"  color="#020100"></a-box>
    <a-box position="0  1.5 -7"  width="0.3" height="3"   depth="2.8"  color="#020100"></a-box>
    <a-box position="-4  -0.3 2" width="1.0" height="0.7" depth="4.5"  color="#020100"></a-box>
    <a-box position="-9  -0.3 2" width="1.0" height="0.7" depth="4.5"  color="#020100"></a-box>
    <a-box position=" 4  -0.3 2" width="1.0" height="0.7" depth="4.5"  color="#020100"></a-box>
    <a-box position=" 9  -0.3 2" width="1.0" height="0.7" depth="4.5"  color="#020100"></a-box>
  </a-entity>

  <!-- ═══════════════════════════════════════════════════════════════
       BARRAGE BALLOONS
       Real balloons: ~19 m long, ~8 m diameter, silver fabric.
       Cables were ~7 mm steel wire — shown as thin 0.05 m boxes.
       Positioned at realistic altitudes (45–65 m) above the alley.
       Each balloon: elongated ellipsoid (sphere scaled on parent entity)
                     + two stabilising tail fins at the rear.
  ════════════════════════════════════════════════════════════════ -->

  <!-- Balloon 1 — high above west side, tilted slightly nose-up in wind -->
  <a-entity position="-12 55 -20" rotation="0 20 -8">
    <!-- Main gas bag: 19 m long, 8 m tall, 7 m wide -->
    <a-entity scale="1 1 1">
      <a-sphere radius="4.5"
                material="color: #9eb0a4; roughness: 0.3; metalness: 0.45;
                          emissive: #2a3830; emissiveIntensity: 0.1"
                geometry="primitive: sphere; segmentsWidth: 12; segmentsHeight: 8"
                scale="2.1 1 0.85"></a-sphere>
    </a-entity>
    <!-- Tail fin — vertical -->
    <a-box position="-7.5 1.5 0" width="3.5" height="2.2" depth="0.18" rotation="0 0 18"
           material="color: #8aa09a; roughness: 0.4; metalness: 0.35"></a-box>
    <!-- Tail fin — horizontal left -->
    <a-box position="-7.5 0 -1.8" width="3.5" height="0.18" depth="2.2" rotation="0 -10 8"
           material="color: #8aa09a; roughness: 0.4; metalness: 0.35"></a-box>
    <!-- Tail fin — horizontal right -->
    <a-box position="-7.5 0  1.8" width="3.5" height="0.18" depth="2.2" rotation="0  10 8"
           material="color: #8aa09a; roughness: 0.4; metalness: 0.35"></a-box>
    <!-- Nose attachment point (small dark fitting) -->
    <a-box position="9.5 0 0" width="0.4" height="0.4" depth="0.4" color="#2a2820"></a-box>
  </a-entity>
  <!-- Cable 1 — runs from nose fitting down toward ground, slight angle from wind -->
  <a-box position="-9.5 27 -18" width="0.05" height="56" depth="0.05"
         color="#3a3830" rotation="0 0 12"></a-box>

  <!-- Balloon 2 — lower, more central, directly overhead mid-alley -->
  <a-entity position="3 42 -25" rotation="0 -15 5">
    <a-entity scale="1 1 1">
      <a-sphere radius="4"
                material="color: #a8b8ac; roughness: 0.28; metalness: 0.5;
                          emissive: #303c34; emissiveIntensity: 0.08"
                geometry="primitive: sphere; segmentsWidth: 12; segmentsHeight: 8"
                scale="2.2 1 0.9"></a-sphere>
    </a-entity>
    <a-box position="-7 1.2 0"  width="3.2" height="2.0" depth="0.16" rotation="0 0 15"
           material="color: #90a898; roughness: 0.4; metalness: 0.35"></a-box>
    <a-box position="-7 0 -1.6" width="3.2" height="0.16" depth="2.0" rotation="0 -8 6"
           material="color: #90a898; roughness: 0.4; metalness: 0.35"></a-box>
    <a-box position="-7 0  1.6" width="3.2" height="0.16" depth="2.0" rotation="0  8 6"
           material="color: #90a898; roughness: 0.4; metalness: 0.35"></a-box>
    <a-box position="8.8 0 0" width="0.4" height="0.4" depth="0.4" color="#2a2820"></a-box>
  </a-entity>
  <!-- Cable 2 -->
  <a-box position="5 21 -24" width="0.05" height="42" depth="0.05"
         color="#3a3830" rotation="0 0 -8"></a-box>

  <!-- Balloon 3 — high and far, east side, visible above damaged roofline -->
  <a-entity position="18 65 -35" rotation="0 35 3">
    <a-entity scale="1 1 1">
      <a-sphere radius="4.2"
                material="color: #909e98; roughness: 0.32; metalness: 0.42;
                          emissive: #282e28; emissiveIntensity: 0.07"
                geometry="primitive: sphere; segmentsWidth: 12; segmentsHeight: 8"
                scale="2.0 1 0.88"></a-sphere>
    </a-entity>
    <a-box position="-6.5 1.0 0"  width="3.0" height="1.8" depth="0.15" rotation="0 0 12"
           material="color: #808e88; roughness: 0.4; metalness: 0.35"></a-box>
    <a-box position="-6.5 0 -1.5" width="3.0" height="0.15" depth="1.8" rotation="0 -12 5"
           material="color: #808e88; roughness: 0.4; metalness: 0.35"></a-box>
    <a-box position="-6.5 0  1.5" width="3.0" height="0.15" depth="1.8" rotation="0  12 5"
           material="color: #808e88; roughness: 0.4; metalness: 0.35"></a-box>
    <a-box position="8.4 0 0" width="0.35" height="0.35" depth="0.35" color="#2a2820"></a-box>
  </a-entity>
  <!-- Cable 3 — long run down to east side of street -->
  <a-box position="21 32 -33" width="0.05" height="66" depth="0.05"
         color="#383630" rotation="0 0 -15"></a-box>

  <!-- ═══ GROUND ═══
       Full 30 m cobbled floor — no gaps.
       Street texture, high repeat for fine cobble detail.
  -->
  <a-plane position="0 0.001 -15" rotation="-90 0 0" width="4.0" height="30"
    material="src: #road-diff; normalMap: #road-norm; normalScale: 1.5 1.5; roughnessMap: #road-rough;
              repeat: 3 20; roughness: 0.72; metalness: 0.04">
  </a-plane>
  <!-- Side alley ground -->
  <a-plane position="6 0.001 -25" rotation="-90 0 0" width="8" height="10"
    material="src: #road-diff; normalMap: #road-norm; normalScale: 1.5 1.5; roughnessMap: #road-rough;
              repeat: 4 8; roughness: 0.94; metalness: 0">
  </a-plane>
  <!-- Pub step / forecourt -->
  <a-box position="0 0.07 -29.55" width="2.0" height="0.14" depth="0.6" color="#787068"></a-box>

  <!-- ═══════════════════════════════════════════════════════════════
       WEST WALL — intact Victorian terrace, 12 m tall
       Face at X = -2.0   Thickness 0.35 m   Centre at X = -2.175

       Dog-leg: Seg 1 Z= 0 to -12   face X=-2.0
                Seg 2 Z=-12 to -22  face X=-1.75  (alley 0.25 m wider)
                Seg 3 Z=-22 to -30  face X=-2.0

       Brick repeat rule: roughly depth×2.4 horiz, height×3.2 vert
       (this gives bricks ~23 cm wide × 7 cm tall in world space)
  ════════════════════════════════════════════════════════════════ -->

  <!-- Seg 1 -->
  <a-box position="-2.175 6 -6" width="0.35" height="12" depth="12"
    material="src: #brick-diff; normalMap: #brick-norm; normalScale: 2 2; roughnessMap: #brick-rough; aoMap: #brick-ao;
              repeat: 29 38; roughness: 0.85; metalness: 0; color: #6b4a2a;
              emissive: #0c0804; emissiveIntensity: 0.12">
  </a-box>

  <!-- Dog-leg fill at Z=-12 -->
  <a-box position="-2.05 6 -12" width="0.6" height="12" depth="0.4"
    material="src: #brick-diff; normalMap: #brick-norm; normalScale: 2 2; roughnessMap: #brick-rough; aoMap: #brick-ao;
              repeat: 1 38; roughness: 0.85; metalness: 0; color: #6b4a2a;
              emissive: #0c0804; emissiveIntensity: 0.12">
  </a-box>

  <!-- Seg 2 (face X=-1.75) -->
  <a-box position="-1.925 6 -17" width="0.35" height="12" depth="10"
    material="src: #brick-diff; normalMap: #brick-norm; normalScale: 2 2; roughnessMap: #brick-rough; aoMap: #brick-ao;
              repeat: 24 38; roughness: 0.85; metalness: 0; color: #6b4a2a;
              emissive: #0c0804; emissiveIntensity: 0.12">
  </a-box>

  <!-- Dog-leg fill at Z=-22 -->
  <a-box position="-2.05 6 -22" width="0.6" height="12" depth="0.4"
    material="src: #brick-diff; normalMap: #brick-norm; normalScale: 2 2; roughnessMap: #brick-rough; aoMap: #brick-ao;
              repeat: 1 38; roughness: 0.85; metalness: 0; color: #6b4a2a;
              emissive: #0c0804; emissiveIntensity: 0.12">
  </a-box>

  <!-- Seg 3 -->
  <a-box position="-2.175 6 -26" width="0.35" height="12" depth="8"
    material="src: #brick-diff; normalMap: #brick-norm; normalScale: 2 2; roughnessMap: #brick-rough; aoMap: #brick-ao;
              repeat: 19 38; roughness: 0.85; metalness: 0; color: #6b4a2a;
              emissive: #0c0804; emissiveIntensity: 0.12">
  </a-box>

  <!-- ═══ WEST STRING COURSES — stone bands between floors ═══
       Floor 1→2 at Y=3.6, floor 2→3 at Y=6.5 (slightly proud of brick face)
