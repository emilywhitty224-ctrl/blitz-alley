<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackout Alley — London, 1940</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>
  <script>
    AFRAME.registerComponent('fire-flicker', {
      schema: { min: { default: 0.6 }, max: { default: 1.6 }, chance: { default: 0.08 } },
      tick: function () {
        if (Math.random() < this.data.chance) {
          var v = this.data.min + Math.random() * (this.data.max - this.data.min);
          this.el.setAttribute('light', 'intensity', v);
        }
      }
    });
    // Random distant explosion flash
    AFRAME.registerComponent('explosion-flash', {
      schema: { minGap: { default: 8 }, maxGap: { default: 25 }, duration: { default: 0.12 } },
      init: function () {
        this.timer = 3 + Math.random() * 10;
        this.active = false;
        this.elapsed = 0;
      },
      tick: function (time, dt) {
        var s = dt / 1000;
        if (!this.active) {
          this.timer -= s;
          if (this.timer <= 0) {
            this.active = true;
            this.elapsed = 0;
            this.el.setAttribute('light', 'intensity', 4.0);
            this.timer = this.data.minGap + Math.random() * (this.data.maxGap - this.data.minGap);
          }
        } else {
          this.elapsed += s;
          if (this.elapsed >= this.data.duration) {
            this.active = false;
            this.el.setAttribute('light', 'intensity', 0);
          }
        }
      }
    });

    // Slow upward smoke drift
    AFRAME.registerComponent('smoke-drift', {
      schema: { speed: { default: 0.3 }, range: { default: 6 }, startY: { default: 1 } },
      init: function () {
        this.y = this.data.startY + Math.random() * 3;
        this.el.setAttribute('position', this.el.getAttribute('position').x + ' ' + this.y + ' ' + this.el.getAttribute('position').z);
      },
      tick: function (time, dt) {
        this.y += this.data.speed * (dt / 1000);
        var pos = this.el.getAttribute('position');
        if (this.y > this.data.startY + this.data.range) this.y = this.data.startY;
        this.el.setAttribute('position', pos.x + ' ' + this.y + ' ' + pos.z);
      }
    });

    AFRAME.registerComponent('searchlight-sweep', {
      schema: { swing: { default: 18 }, speed: { default: 0.1 } },
      init: function () { this.t = 0; },
      tick: function (time, dt) {
        this.t += this.data.speed * (dt / 1000);
        this.el.setAttribute('rotation', '72 ' + (Math.sin(this.t) * this.data.swing).toFixed(2) + ' 0');
      }
    });
  </script>
</head>
<body>
<a-scene
  fog="type: linear; color: #1a1208; near: 24; far: 44"
  renderer="colorManagement: true"
  background="color: #060402">

  <a-assets timeout="15000">
    <img id="brick-diff"  src="brown_brick_diffuse.jpg">
    <img id="brick-norm"  src="brown_brick_normal.jpg">
    <img id="brick-rough" src="brown_brick_roughness.jpg">
    <img id="brick-ao"    src="brown_brick_ao.jpg">
    <img id="stone-diff"  src="sandstone_diffuse.jpg">
    <img id="stone-ao"    src="sandstone_ao.jpg">
    <img id="stone-rough" src="Sandstone_Rough.jpg">
    <img id="road-diff"   src="street_diffuse.jpg">
    <img id="road-norm"   src="street_normal.jpg">
    <img id="road-rough"  src="street_roughness.jpg">
    <img id="pub-diff"    src="pub_tile_diffuse.jpg">
    <img id="pub-norm"    src="pub_tile_normal.jpg">
    <img id="pub-rough"   src="pub_tile_roughness.jpg">
    <audio id="blitz-snd" src="blitz.mp3" preload="auto"></audio>
    <a-asset-item id="pubdoors-glb" src="Pubdoors.glb"></a-asset-item>
    <a-asset-item id="barrel-glb"   src="woodenbarrel.glb"></a-asset-item>
    <a-asset-item id="sandbag-glb"  src="Sandbagwall.glb"></a-asset-item>
    <a-asset-item id="rubble-glb"   src="rubble.glb"></a-asset-item>
  </a-assets>

  <a-entity sound="src: #blitz-snd; autoplay: true; loop: true; volume: 0.9; positional: false"></a-entity>

  <!-- ═══ LIGHTING ═══
       Cool blue-grey ambient = moonlight through smoke.
       Fire = warm amber at end, hotter orange-red in side alley.
       Lamps = barely on (blackout). No pure red wash.
  -->
  <a-light type="ambient"     color="#1c2230" intensity="0.75"></a-light>
  <a-light type="directional" color="#b0bcd0" intensity="0.25" position="3 12 8"></a-light>

  <!-- Amber fire glow at pub end -->
  <a-light type="point" color="#ff9933" intensity="1.1" distance="18" decay="2"
           position="0 2.5 -29" fire-flicker></a-light>
  <!-- Hot fire in side alley -->
  <a-light type="point" color="#ff5500" intensity="2.2" distance="20" decay="1.6"
           position="8 2 -25" fire-flicker></a-light>
  <!-- Fire spill into main alley at gap -->
  <a-light type="point" color="#ff7722" intensity="0.9" distance="9" decay="2"
           position="3 1.8 -22" fire-flicker></a-light>
  <!-- Pub interior warmth -->
  <a-light type="point" color="#ffaa55" intensity="0.8" distance="6" decay="2"
           position="0 1.2 -29.4"></a-light>
  <!-- Amber window leaking light -->
  <a-light type="point" color="#ff9933" intensity="0.5" distance="4" decay="2"
           position="-1.9 5.0 -7"></a-light>
  <!-- Gas lamp 1 (barely on) -->
  <a-light type="point" color="#ffcc77" intensity="0.1" distance="3" decay="2"
           position="-1.75 3.1 -10"></a-light>
  <!-- Gas lamp 2 -->
  <a-light type="point" color="#ffcc77" intensity="0.08" distance="3" decay="2"
           position="-1.75 3.1 -21"></a-light>
  <!-- Searchlight -->
  <a-entity position="0 42 -18" searchlight-sweep>
    <a-light type="spot" color="#dde8ff" intensity="1.8" angle="2" penumbra="0.5"
             distance="80" decay="1"></a-light>
  </a-entity>

  <a-sky color="#050402"></a-sky>

  <!-- ═══ GROUND ═══
       Full 30 m cobbled floor — no gaps.
       Street texture, high repeat for fine cobble detail.
  -->
  <a-plane position="0 0.001 -15" rotation="-90 0 0" width="4.0" height="30"
    material="src: #road-diff; normalMap: #road-norm; roughnessMap: #road-rough;
              repeat: 8 60; roughness: 0.94; metalness: 0">
  </a-plane>
  <!-- Side alley ground -->
  <a-plane position="6 0.001 -25" rotation="-90 0 0" width="8" height="10"
    material="src: #road-diff; normalMap: #road-norm; roughnessMap: #road-rough;
              repeat: 16 20; roughness: 0.94; metalness: 0">
  </a-plane>
  <!-- Pub step / forecourt -->
  <a-box position="0 0.07 -29.55" width="2.0" height="0.14" depth="0.6"
         material="src: #stone-diff; roughnessMap: #stone-rough; repeat: 2 0.6; roughness: 0.88; metalness: 0">
  </a-box>

  <!-- ═══════════════════════════════════════════════════════════════
       WEST WALL — intact Victorian terrace, 12 m tall
       Face at X = -2.0   Thickness 0.35 m   Centre at X = -2.175

       Dog-leg: Seg 1 Z= 0 to -12   face X=-2.0
                Seg 2 Z=-12 to -22  face X=-1.75  (alley 0.25 m wider)
                Seg 3 Z=-22 to -30  face X=-2.0

       Brick repeat rule: roughly depth×2.4 horiz, height×3.2 vert
       (this gives bricks ~23 cm wide × 7 cm tall in world space)
  ════════════════════════════════════════════════════════════════ -->

  <!-- Seg 1 -->
  <a-box position="-2.175 6 -6" width="0.35" height="12" depth="12"
    material="src: #brick-diff; normalMap: #brick-norm; roughnessMap: #brick-rough; aoMap: #brick-ao;
              repeat: 29 38; roughness: 0.85; metalness: 0; color: #6b4a2a">
  </a-box>

  <!-- Dog-leg fill at Z=-12 -->
  <a-box position="-2.05 6 -12" width="0.6" height="12" depth="0.4"
    material="src: #brick-diff; normalMap: #brick-norm; roughnessMap: #brick-rough; aoMap: #brick-ao;
              repeat: 1 38; roughness: 0.85; metalness: 0; color: #6b4a2a">
  </a-box>

  <!-- Seg 2 (face X=-1.75) -->
  <a-box position="-1.925 6 -17" width="0.35" height="12" depth="10"
    material="src: #brick-diff; normalMap: #brick-norm; roughnessMap: #brick-rough; aoMap: #brick-ao;
              repeat: 24 38; roughness: 0.85; metalness: 0; color: #6b4a2a">
  </a-box>

  <!-- Dog-leg fill at Z=-22 -->
  <a-box position="-2.05 6 -22" width="0.6" height="12" depth="0.4"
    material="src: #brick-diff; normalMap: #brick-norm; roughnessMap: #brick-rough; aoMap: #brick-ao;
              repeat: 1 38; roughness: 0.85; metalness: 0; color: #6b4a2a">
  </a-box>

  <!-- Seg 3 -->
  <a-box position="-2.175 6 -26" width="0.35" height="12" depth="8"
    material="src: #brick-diff; normalMap: #brick-norm; roughnessMap: #brick-rough; aoMap: #brick-ao;
              repeat: 19 38; roughness: 0.85; metalness: 0; color: #6b4a2a">
  </a-box>

  <!-- ═══ WEST STRING COURSES — stone bands between floors ═══
       Floor 1→2 at Y=3.6, floor 2→3 at Y=6.5 (slightly proud of brick face)
  -->
  <a-box position="-2.01 3.6 -15" width="0.08" height="0.18" depth="30.5"
    material="src: #stone-diff; roughnessMap: #stone-rough; repeat: 30 0.2; roughness: 0.88; metalness: 0">
  </a-box>
  <a-box position="-2.01 6.5 -15" width="0.08" height="0.14" depth="30.5"
    material="src: #stone-diff; roughnessMap: #stone-rough; repeat: 30 0.15; roughness: 0.88; metalness: 0">
  </a-box>

  <!-- West parapet -->
  <a-box position="-2.175 12.3 -15" width="0.65" height="0.6" depth="30.5" color="#3a2818"></a-box>
  <!-- Chimney 1 -->
  <a-box position="-2.05 13.8 -8"  width="0.7" height="2.8" depth="0.7"
    material="src: #brick-diff; normalMap: #brick-norm; roughnessMap: #brick-rough;
              repeat: 2 9; roughness: 0.85; metalness: 0; color: #5a3c20">
  </a-box>
  <a-box position="-2.05 15.3 -8"  width="0.55" height="0.15" depth="0.55" color="#2a1e10"></a-box>
  <!-- Chimney 2 -->
  <a-box position="-2.05 13.5 -20" width="0.7" height="2.2" depth="0.7"
    material="src: #brick-diff; normalMap: #brick-norm; roughnessMap: #brick-rough;
              repeat: 2 7; roughness: 0.85; metalness: 0; color: #5a3c20">
  </a-box>
  <a-box position="-2.05 14.65 -20" width="0.55" height="0.15" depth="0.55" color="#2a1e10"></a-box>

  <!-- ═══ WEST WINDOWS ═══
       Frame protrudes slightly from face (X = -2.0)
       Glass sits just inside frame.
       Blast tape X pattern on all.
  -->
  <!-- Ground floor Z=-4 -->
  <a-box position="-2.03 1.9 -4"   width="0.09" height="1.9" depth="1.05" color="#1a1008"></a-box>
  <a-box position="-2.01 1.9 -4"   width="0.05" height="1.7" depth="0.88"
         material="transparent: true; opacity: 0.95; color: #020302; roughness: 0.2; metalness: 0.1"></a-box>
  <a-box position="-2.00 1.9 -4"   rotation="45 0 0"  width="0.01" height="1.8" depth="0.06" color="#c4a030"></a-box>
  <a-box position="-2.00 1.9 -4"   rotation="-45 0 0" width="0.01" height="1.8" depth="0.06" color="#c4a030"></a-box>

  <!-- Ground floor Z=-9 -->
  <a-box position="-2.03 1.9 -9"   width="0.09" height="1.9" depth="1.05" color="#1a1008"></a-box>
  <a-box position="-2.01 1.9 -9"   width="0.05" height="1.7" depth="0.88"
         material="transparent: true; opacity: 0.95; color: #020302; roughness: 0.2; metalness: 0.1"></a-box>
  <a-box position="-2.00 1.9 -9"   rotation="45 0 0"  width="0.01" height="1.8" depth="0.06" color="#c4a030"></a-box>
  <a-box position="-2.00 1.9 -9"   rotation="-45 0 0" width="0.01" height="1.8" depth="0.06" color="#c4a030"></a-box>

  <!-- First floor Z=-7 — AMBER LIT (curtain slipping) -->
  <a-box position="-2.03 4.9 -7"   width="0.09" height="1.7" depth="1.05" color="#1a1008"></a-box>
  <a-box position="-2.01 4.9 -7"   width="0.05" height="1.5" depth="0.88"
         material="transparent: true; opacity: 0.92; color: #3a1e00;
                   emissive: #241200; emissiveIntensity: 1.6; roughness: 0.2; metalness: 0"></a-box>
  <!-- Glazing bar -->
  <a-box position="-2.02 4.9 -7"   width="0.06" height="1.5" depth="0.05" color="#1a1008"></a-box>

  <!-- Seg 2 ground floor Z=-15 -->
  <a-box position="-1.78 1.9 -15"  width="0.09" height="1.9" depth="1.05" color="#1a1008"></a-box>
  <a-box position="-1.76 1.9 -15"  width="0.05" height="1.7" depth="0.88"
         material="transparent: true; opacity: 0.95; color: #020302; roughness: 0.2; metalness: 0.1"></a-box>
  <a-box position="-1.75 1.9 -15"  rotation="45 0 0"  width="0.01" height="1.8" depth="0.06" color="#c4a030"></a-box>
  <a-box position="-1.75 1.9 -15"  rotation="-45 0 0" width="0.01" height="1.8" depth="0.06" color="#c4a030"></a-box>

  <!-- Seg 2 first floor Z=-17 -->
  <a-box position="-1.78 4.9 -17"  width="0.09" height="1.7" depth="1.05" color="#1a1008"></a-box>
  <a-box position="-1.76 4.9 -17"  width="0.05" height="1.5" depth="0.88"
         material="transparent: true; opacity: 0.95; color: #020302; roughness: 0.2; metalness: 0.1"></a-box>
  <a-box position="-1.75 4.9 -17"  rotation="45 0 0"  width="0.01" height="1.5" depth="0.06" color="#c4a030"></a-box>
  <a-box position="-1.75 4.9 -17"  rotation="-45 0 0" width="0.01" height="1.5" depth="0.06" color="#c4a030"></a-box>

  <!-- Seg 3 ground floor Z=-25 -->
  <a-box position="-2.03 1.9 -25"  width="0.09" height="1.9" depth="1.05" color="#1a1008"></a-box>
  <a-box position="-2.01 1.9 -25"  width="0.05" height="1.7" depth="0.88"
         material="transparent: true; opacity: 0.95; color: #020302; roughness: 0.2; metalness: 0.1"></a-box>
  <a-box position="-2.00 1.9 -25"  rotation="45 0 0"  width="0.01" height="1.8" depth="0.06" color="#c4a030"></a-box>
  <a-box position="-2.00 1.9 -25"  rotation="-45 0 0" width="0.01" height="1.8" depth="0.06" color="#c4a030"></a-box>

  <!-- ═══ WINDOW SILLS — west wall ═══
       Windows: ground floor Y=1.9 h=1.9 → bottom Y=0.95 → sill Y=0.88
                first floor  Y=4.9 h=1.7 → bottom Y=4.05 → sill Y=3.98
  -->
  <a-box position="-2.02 0.88 -4"  width="0.15" height="0.08" depth="1.2"
    material="src: #stone-diff; roughnessMap: #stone-rough; repeat: 1.2 0.1; roughness: 0.88; metalness: 0">
  </a-box>
  <a-box position="-2.02 0.88 -9"  width="0.15" height="0.08" depth="1.2"
    material="src: #stone-diff; roughnessMap: #stone-rough; repeat: 1.2 0.1; roughness: 0.88; metalness: 0">
  </a-box>
  <a-box position="-2.02 3.98 -7"  width="0.15" height="0.08" depth="1.12"
    material="src: #stone-diff; roughnessMap: #stone-rough; repeat: 1.1 0.1; roughness: 0.88; metalness: 0">
  </a-box>
  <!-- Seg 2 sills -->
  <a-box position="-1.79 0.88 -15" width="0.15" height="0.08" depth="1.2"
    material="src: #stone-diff; roughnessMap: #stone-rough; repeat: 1.2 0.1; roughness: 0.88; metalness: 0">
  </a-box>
  <a-box position="-1.79 3.98 -17" width="0.15" height="0.08" depth="1.12"
    material="src: #stone-diff; roughnessMap: #stone-rough; repeat: 1.1 0.1; roughness: 0.88; metalness: 0">
  </a-box>
  <!-- Seg 3 sill -->
  <a-box position="-2.02 0.88 -25" width="0.15" height="0.08" depth="1.2"
    material="src: #stone-diff; roughnessMap: #stone-rough; repeat: 1.2 0.1; roughness: 0.88; metalness: 0">
  </a-box>

  <!-- ═══ STONE BASE PLINTH — west wall ═══
       0.3 m tall stone plinth at ground level, slightly proud of brick face.
       Keeps damp off brickwork — very typical Victorian.
  -->
  <a-box position="-2.01 0.15 -6"   width="0.05" height="0.3" depth="12"
    material="src: #stone-diff; aoMap: #stone-ao; roughnessMap: #stone-rough;
              repeat: 12 0.3; roughness: 0.9; metalness: 0">
  </a-box>
  <a-box position="-1.76 0.15 -17"  width="0.05" height="0.3" depth="10"
    material="src: #stone-diff; aoMap: #stone-ao; roughnessMap: #stone-rough;
              repeat: 10 0.3; roughness: 0.9; metalness: 0">
  </a-box>
  <a-box position="-2.01 0.15 -26"  width="0.05" height="0.3" depth="8"
    material="src: #stone-diff; aoMap: #stone-ao; roughnessMap: #stone-rough;
              repeat: 8 0.3; roughness: 0.9; metalness: 0">
  </a-box>

  <!-- ═══ DRAINPIPES — west wall ═══
       Cast iron, Victorian. Run from gutter (12 m) to ground.
       Circular-ish (box stand-in), 0.08 m sq, dark iron.
  -->
  <a-box position="-1.995 6 -3"  width="0.08" height="12" depth="0.08" color="#252018"></a-box>
  <a-box position="-1.995 6 -11" width="0.08" height="12" depth="0.08" color="#252018"></a-box>
  <a-box position="-1.745 6 -19" width="0.08" height="12" depth="0.08" color="#252018"></a-box>
  <a-box position="-1.995 6 -27" width="0.08" height="12" depth="0.08" color="#252018"></a-box>
  <!-- Pipe shoes (small bracket boxes at ground) -->
  <a-box position="-1.98 0.2 -3"  width="0.14" height="0.12" depth="0.14" color="#1e1a12"></a-box>
  <a-box position="-1.98 0.2 -11" width="0.14" height="0.12" depth="0.14" color="#1e1a12"></a-box>
  <a-box position="-1.73 0.2 -19" width="0.14" height="0.12" depth="0.14" color="#1e1a12"></a-box>
  <a-box position="-1.98 0.2 -27" width="0.14" height="0.12" depth="0.14" color="#1e1a12"></a-box>

  <!-- ═══ WEST DOOR (ground floor recess, Z=-12) ═══ -->
  <a-box position="-2.03 1.1 -12.5" width="0.09" height="2.3" depth="1.05" color="#1a1008"></a-box>
  <a-box position="-2.00 1.05 -12.5" width="0.06" height="2.0" depth="0.9" color="#241a0c"></a-box>
  <a-box position="-1.97 1.3  -12.5" width="0.04" height="0.6" depth="0.68" color="#1c1408"></a-box>
  <a-box position="-1.97 0.45 -12.5" width="0.04" height="0.45" depth="0.68" color="#1c1408"></a-box>

  <!-- ═══ WALL LAMPS (gas, blackout — nearly off) ═══ -->
  <!-- Lamp at Z=-10 -->
  <a-box position="-1.92 3.45 -10" width="0.36" height="0.05" depth="0.05" color="#181008"></a-box>
  <a-box position="-1.73 3.25 -10" width="0.19" height="0.36" depth="0.19" color="#181008"></a-box>
  <a-box position="-1.73 3.07 -10" width="0.12" height="0.18" depth="0.12"
         material="transparent: true; opacity: 0.55; color: #ffcc66;
                   emissive: #886600; emissiveIntensity: 0.45; roughness: 0.3; metalness: 0"></a-box>
  <!-- Lamp at Z=-21 -->
  <a-box position="-1.78 3.45 -21" width="0.32" height="0.05" depth="0.05" color="#181008"></a-box>
  <a-box position="-1.61 3.25 -21" width="0.18" height="0.34" depth="0.18" color="#181008"></a-box>
  <a-box position="-1.61 3.08 -21" width="0.11" height="0.17" depth="0.11"
         material="transparent: true; opacity: 0.4; color: #ffcc66;
                   emissive: #553300; emissiveIntensity: 0.25; roughness: 0.3; metalness: 0"></a-box>

  <!-- ═══════════════════════════════════════════════════════════════
       EAST WALL — bomb damaged
       Seg 1: Z=0  to -10   full 12 m
       Seg 2: Z=-10 to -16  8 m tall, ragged
       Seg 3: Z=-16 to -20  3.5 m, rubble wall
       Z=-20 onward: OPEN → side alley / fire visible
  ════════════════════════════════════════════════════════════════ -->

  <!-- Seg 1 (intact) -->
  <a-box position="2.175 6 -5" width="0.35" height="12" depth="10"
    material="src: #brick-diff; normalMap: #brick-norm; roughnessMap: #brick-rough; aoMap: #brick-ao;
              repeat: 24 38; roughness: 0.85; metalness: 0; color: #5a3c20">
  </a-box>
  <a-box position="2.175 12.3 -5" width="0.55" height="0.6" depth="10.5" color="#3a2818"></a-box>

  <!-- Seg 2 (damaged, 8 m) -->
  <a-box position="2.175 4 -13" width="0.35" height="8" depth="6"
    material="src: #brick-diff; normalMap: #brick-norm; roughnessMap: #brick-rough; aoMap: #brick-ao;
              repeat: 14 25; roughness: 0.9; metalness: 0; color: #4a3018">
  </a-box>
  <!-- Ragged upper remnants -->
  <a-box position="2.175 9.5 -11" width="0.35" height="3" depth="3"
    material="src: #brick-diff; normalMap: #brick-norm; roughnessMap: #brick-rough; aoMap: #brick-ao;

  </a-box>
  <a-box position="2.175 8.2 -15" width="0.35" height="1.8" depth="2"
    material="src: #brick-diff; normalMap: #brick-norm; roughnessMap: #brick-rough; aoMap: #brick-ao;

         material="transparent: true; opacity: 0.5; color: #040302; roughness: 1; metalness: 0">
  </a-box>

  <!-- ═══ PLAYER ═══ -->
  <a-entity id="rig" position="0 0 -1"
            movement-controls="fly: false; speed: 0.8; camera: #cam">
    <a-entity id="cam" camera look-controls position="0 1.6 0"></a-entity>
    <a-entity oculus-touch-controls="hand: left"></a-entity>
    <a-entity oculus-touch-controls="hand: right"></a-entity>
  </a-entity>

</a-scene>
