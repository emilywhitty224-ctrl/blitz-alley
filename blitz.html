<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blitz Alley — London, 1940</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.4.0/dist/aframe-extras.min.js" crossorigin="anonymous"></script>
  <script src="vr-placer.js"></script>
  <script>window._walkSpeed = 0.1;</script>
  <script>
    AFRAME.registerComponent('night-darken', {
      init: function () {
        this.el.addEventListener('model-loaded', function (e) {
          e.detail.model.traverse(function (node) {
            if (!node.isMesh) return;
            var mats = Array.isArray(node.material) ? node.material : [node.material];
            mats.forEach(function (mat) {
              // Dark cool-blue tint — multiplies the baked texture colour
              mat.color.setRGB(0.06, 0.07, 0.10);
              // Kill any self-illumination (emissive maps make objects glow regardless of lights)
              if (mat.emissive) mat.emissive.setRGB(0, 0, 0);
              mat.emissiveIntensity = 0;
              mat.needsUpdate = true;
            });
          });
        });
      }
    });
  </script>
  <style>
    #version-overlay {
      position: fixed;
      bottom: 18px;
      right: 90px;
      color: #88aacc;
      font-family: monospace;
      font-size: 13px;
      opacity: 0.75;
      pointer-events: none;
      z-index: 9999;
      user-select: none;
    }
  </style>
</head>
<body>
<a-scene
  draco-loader
  vr-placer
  fog="type: linear; color: #050810; near: 15; far: 50"
  renderer="colorManagement: true; antialias: false; physicallyCorrectLights: true; exposure: 0.06"
  background="color: #020408">

  <a-assets timeout="120000">
    <a-asset-item id="scene-glb" src="blitz_alley8.glb"></a-asset-item>
  </a-assets>

  <a-entity gltf-model="#scene-glb" position="0 0 0" scale="1 1 1" night-darken></a-entity>

  <a-light type="ambient" color="#0a0f1a" intensity="0.08"></a-light>
  <a-light type="point" color="#ffaa33" intensity="80" distance="12" decay="2" position="3.32 3.07 -19.04"></a-light>
  <a-light type="point" color="#ffaa33" intensity="80" distance="12" decay="2" position="15.36 2.74 -17.77"></a-light>

  <a-entity id="rig" position="0 0 0"
            movement-controls="fly: false; speed: 0.2; camera: #cam">
    <a-entity id="cam" camera look-controls position="0 1.6 0"></a-entity>
    <a-entity oculus-touch-controls="hand: left;  model: false"></a-entity>
    <a-entity oculus-touch-controls="hand: right; model: false"></a-entity>
  </a-entity>

</a-scene>
<div id="version-overlay">v9</div>
</body>
</html>
