<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Royal Oak — WWII London, 1940</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- aframe-extras: thumbstick locomotion for Quest controllers -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>
  <script>
    AFRAME.registerComponent('blitz-flicker', {
      schema: {
        minIntensity: { default: 0.1 },
        maxIntensity: { default: 1.0 },
        chance:       { default: 0.04 }
      },
      tick: function () {
        if (Math.random() < this.data.chance) {
          const v = this.data.minIntensity +
                    Math.random() * (this.data.maxIntensity - this.data.minIntensity);
          this.el.setAttribute('light', 'intensity', v);
        }
      }
    });

    AFRAME.registerComponent('searchlight-sweep', {
      schema: {
        vertAngle: { default: 15 },
        swing:     { default: 20 },
        speed:     { default: 0.18 }
      },
      init: function () { this.t = 0; },
      tick: function (time, dt) {
        this.t += this.data.speed * (dt / 1000);
        const v = this.data.vertAngle + Math.sin(this.t * 0.6) * 4;
        const p = Math.sin(this.t) * this.data.swing;
        this.el.setAttribute('rotation', `${v.toFixed(2)} ${p.toFixed(2)} 0`);
      }
    });

    // terrace-house: WWII London terrace, front door faces local +Z
    // Rotate entity to orient: 0 90 0=east, 0 -90 0=west, 0 0 0=south, 0 180 0=north
    AFRAME.registerComponent('terrace-house', {
      schema: {
        width:    { default: 5 },
        height:   { default: 7 },
        depth:    { default: 6 },
        chimneys: { default: 1 },
        doorOff:  { default: 0 },
        render:   { default: false }   // stucco/painted render front facade
      },
      init: function () {
        const el = this.el;
        const W = this.data.width, H = this.data.height;
        const D = this.data.depth, NC = this.data.chimneys, DX = this.data.doorOff;
        const IS_RENDER = this.data.render;

        const bm = 'src: #brick-diff; normalMap: #brick-norm; roughnessMap: #brick-rough; aoMap: #brick-ao; roughness: 0.85; metalness: 0; normalScale: 2 2';

        // Subtle brick colour variation per house (deterministic from dimensions)
        const BRICK_COLS = ['#7a4a2a','#6e4228','#824e2e','#76422a','#7e502e'];
        const bv = BRICK_COLS[(Math.round(W * 13 + H * 7)) % BRICK_COLS.length];
        // Period paint shades for rendered/stucco houses
        const PAINT_COLS = ['#d0c4a0','#c8bca0','#ccc4ae','#d4c8a8'];
        const pv = PAINT_COLS[(Math.round(W * 11 + H * 5)) % PAINT_COLS.length];

        function spawn(pos, w, h, d, attrs) {
          const b = document.createElement('a-box');
          b.setAttribute('position', pos);
          b.setAttribute('width',  '' + w);
          b.setAttribute('height', '' + h);
          b.setAttribute('depth',  '' + d);
          if (attrs) Object.keys(attrs).forEach(function(k) { b.setAttribute(k, attrs[k]); });
          el.appendChild(b);
        }
        function bwall(pos, w, h, d) {
          const b2 = document.createElement('a-box');
          b2.setAttribute('position', pos);
          b2.setAttribute('width',  '' + w);
          b2.setAttribute('height', '' + h);
          b2.setAttribute('depth',  '' + d);
          b2.setAttribute('cast-shadow', 'true');
          b2.setAttribute('receive-shadow', 'true');
          b2.setAttribute('material', bm + '; repeat: ' + +(w/0.8).toFixed(1) + ' ' + +(h/0.38).toFixed(1) + '; color: ' + bv);
          el.appendChild(b2);
        }
        function spawnCyl(pos, radius, h, col) {
          const c = document.createElement('a-cylinder');
          c.setAttribute('position', pos);
          c.setAttribute('radius',   '' + radius);
          c.setAttribute('height',   '' + h);
          c.setAttribute('color',    col);
          c.setAttribute('segments-radial', '8');
          el.appendChild(c);
        }

        // ── Walls ──────────────────────────────────────────────
        if (IS_RENDER) {
          spawn(`0 ${H/2} ${D/2}`, W, H, 0.25, { material: 'roughness: 0.62; metalness: 0; color: ' + pv });
        } else {
          bwall(`0 ${H/2} ${D/2}`, W, H, 0.25);
        }
        bwall(`0 ${H/2} ${-D/2}`,     W,    H,    0.25);
        bwall(`${-W/2} ${H/2} 0`,     0.25, H,    D - 0.5);
        bwall(`${W/2}  ${H/2} 0`,     0.25, H,    D - 0.5);

        // String course at first-floor level
        spawn(`0 ${H*0.46} ${D/2+0.14}`, W+0.05, 0.14, 0.18, { color: IS_RENDER ? '#bca88a' : '#8a7060' });

        // Eaves guttering
        spawn(`0 ${H+0.07} ${D/2+0.18}`, W+0.15, 0.09, 0.09, { color: '#181410' });

        // Cast-iron drainpipe on right edge
        spawn(`${W/2-0.22} ${H*0.5+0.05} ${D/2+0.2}`, 0.075, H+0.1, 0.075, { color: '#181410' });

        // ── Door ───────────────────────────────────────────────
        const dH = 2.1;
        spawn(`${DX} ${dH/2+0.08} ${D/2+0.15}`, 1.2, dH+0.16, 0.12, { color: '#2a1e10' });
        spawn(`${DX} ${dH/2}      ${D/2+0.22}`, 1.0, dH,       0.08, { color: '#1e140a' });
        spawn(`${DX} ${dH*0.55}   ${D/2+0.24}`, 0.9, 0.05,     0.05, { color: '#140c06' });
        spawn(`${DX} ${dH+0.13}   ${D/2+0.16}`, 1.4, 0.14,     0.20, { color: '#8a7060' }); // lintel
        spawn(`${DX} 0.075        ${D/2+0.60}`, 1.4, 0.15,     0.55, { color: '#707070' }); // step

        // ── Windows + Bay ───────────────────────────────────────
        const winW = 0.9, winH = 1.1;
        const wo  = Math.min(W * 0.27, W/2 - winW/2 - 0.25);
        const glm = 'transparent: true; opacity: 0.80; color: #0a0804; roughness: 0.2; metalness: 0.08; emissive: #5c3010; emissiveIntensity: 0.55';

        // Bay window on wider houses, opposite side from door
        const hasBay = W >= 4.5;
        const bayX   = DX >= 0 ? -wo : wo;
        const bayProj = 0.52, bayW = 1.45, bayGH = H * 0.49;

        [H * 0.24, H * 0.64].forEach(function(wY) {
          [-wo, wo].forEach(function(wX) {
            if (Math.abs(wX - DX) < 0.7) return;
            // Bay replaces ground-floor window on that side
            if (hasBay && Math.abs(wY - H*0.24) < 0.5 && Math.abs(wX - bayX) < 0.5) return;

            spawn(`${wX} ${wY} ${D/2+0.15}`, winW+0.14, winH+0.14, 0.10, { color: '#2a1e10' });
            spawn(`${wX} ${wY} ${D/2+0.22}`, winW, winH, 0.05, { material: glm });
            spawn(`${wX} ${wY} ${D/2+0.24}`, 0.05, winH, 0.03, { color: '#1a1008' });
            spawn(`${wX} ${wY} ${D/2+0.24}`, winW, 0.05, 0.03, { color: '#1a1008' });
            spawn(`${wX} ${wY-winH/2-0.06} ${D/2+0.27}`, winW+0.28, 0.10, 0.22, { color: '#a08870' });
            spawn(`${wX} ${wY+winH/2+0.08} ${D/2+0.24}`, winW+0.24, 0.12, 0.18, { color: '#7a6050' });
          });
        });

        if (hasBay) {
          const bY  = bayGH / 2;
          const bFZ = D/2 + bayProj;
          const bSZ = D/2 + bayProj / 2;
          bwall(`${bayX}                 ${bY} ${bFZ}`, bayW, bayGH, 0.22);
          bwall(`${bayX - bayW/2 - 0.11} ${bY} ${bSZ}`, 0.22, bayGH, bayProj);
          bwall(`${bayX + bayW/2 + 0.11} ${bY} ${bSZ}`, 0.22, bayGH, bayProj);
          // Lead flat roof over bay
          spawn(`${bayX} ${bayGH+0.10} ${bSZ}`, bayW+0.46, 0.15, bayProj+0.26, { color: '#222220' });
          // Window with central glazing bar
          const bgW = bayW - 0.36, bgH = bayGH - 0.65;
          spawn(`${bayX} ${bY} ${bFZ+0.14}`, bgW, bgH, 0.05, { material: glm });
          spawn(`${bayX} ${bY} ${bFZ+0.15}`, 0.05, bgH, 0.03, { color: '#1a1008' });
          spawn(`${bayX} ${bY} ${bFZ+0.15}`, bgW, 0.05, 0.03, { color: '#1a1008' });
          // Sill and lintel on bay front
          spawn(`${bayX} ${bY - bgH/2 - 0.065} ${bFZ+0.16}`, bgW+0.20, 0.10, 0.22, { color: '#a08870' });
          spawn(`${bayX} ${bY + bgH/2 + 0.085} ${bFZ+0.14}`, bgW+0.20, 0.12, 0.18, { color: '#7a6050' });
        }

        // ── Pitched roof ────────────────────────────────────────
        const pitch  = 32 * Math.PI / 180;
        const panelW = (W/2) / Math.cos(pitch);
        const ridgeH = (W/2) * Math.tan(pitch);
        const pCX = W/4, pCY = H + ridgeH/2, roofD = D + 0.6;
        [[-pCX, 32], [pCX, -32]].forEach(function(pr) {
          const r = document.createElement('a-box');
          r.setAttribute('position', `${pr[0]} ${pCY} 0`);
          r.setAttribute('width',    '' + panelW);
          r.setAttribute('height',   '0.22');
          r.setAttribute('depth',    '' + roofD);
          r.setAttribute('rotation', `0 0 ${pr[1]}`);
          r.setAttribute('color',    '#1a1008');
          el.appendChild(r);
        });

        // Gable end fills
        spawn(`0 ${H + ridgeH/2} ${D/2  + 0.15}`, W + 0.3, ridgeH + 0.2, 0.3, { color: '#1a1008' });
        spawn(`0 ${H + ridgeH/2} ${-(D/2 + 0.15)}`, W + 0.3, ridgeH + 0.2, 0.3, { color: '#1a1008' });

        // ── Chimneys ────────────────────────────────────────────
        const ridgeY = H + ridgeH;
        const cW = 0.42, cDp = 0.42, cHt = 1.4;
        for (let c = 0; c < NC; c++) {
          const cX = NC === 1 ? W * 0.2 : (c === 0 ? -W * 0.15 : W * 0.15);
          const cZ = -D * 0.25;
          bwall(`${cX} ${ridgeY + cHt/2} ${cZ}`, cW, cHt, cDp);
          spawn(`${cX} ${ridgeY+cHt+0.10} ${cZ}`, cW*0.70, 0.18, cDp*0.70, { color: '#2a1e15' });
          spawnCyl(`${+(cX - cW*0.16).toFixed(3)} ${ridgeY+cHt+0.56} ${cZ}`, 0.085, 0.72, '#7a4030');
          spawnCyl(`${+(cX + cW*0.16).toFixed(3)} ${ridgeY+cHt+0.56} ${cZ}`, 0.085, 0.72, '#7a4030');
        }
      }
    });

    // blast-tape: WWII X-pattern, sits on glass face
    AFRAME.registerComponent('blast-tape', {
      schema: { wall: { default: 'west' } },
      init: function () {
        const isWest = this.data.wall === 'west';
        [45, -45].forEach(function (angle) {
          const s = document.createElement('a-box');
          s.setAttribute('color', '#c4a040');
          if (isWest) {
            s.setAttribute('position', '-0.04 0 0');
            s.setAttribute('rotation', angle + ' 0 0');
            s.setAttribute('width',  '0.01');
            s.setAttribute('height', '2.4');
            s.setAttribute('depth',  '0.12');
          } else {
            s.setAttribute('position', '0 0 0.04');
            s.setAttribute('rotation', '0 0 ' + angle);
            s.setAttribute('width',  '2.4');
            s.setAttribute('height', '0.12');
            s.setAttribute('depth',  '0.01');
          }
          this.el.appendChild(s);
        }, this);
      }
    });

    // war-window: 4 border strips (open centre) + dark glass IN FRONT of wall face + glazing bars
    // KEY: glass at x=-0.03 (west) / z=+0.03 (south) sits OUTSIDE the wall face.
    //      Frame inner face is 5cm clear of wall — no z-fighting.
    AFRAME.registerComponent('war-window', {
      schema: { wall: { default: 'west' } },
      init: function () {
        const isWest = this.data.wall === 'west';
        const el = this.el;
        function box(pos, w, h, d, col, mat) {
          const b = document.createElement('a-box');
          b.setAttribute('position', pos);
          b.setAttribute('width',  '' + w);
          b.setAttribute('height', '' + h);
          b.setAttribute('depth',  '' + d);
          if (mat) { b.setAttribute('material', mat); }
          else     { b.setAttribute('color', col); }
          el.appendChild(b);
        }
        const fr  = '#0d1a0a';
        const bar = '#0d1a0a';
        const glm = 'transparent: true; opacity: 0.80; metalness: 0.05; roughness: 0.3; color: #0a0804; emissive: #4a2808; emissiveIntensity: 0.5';

        if (isWest) {
          // Frame: inner face X=3.95, wall face X=4.0 — 5cm gap, no z-fight
          box('-0.10  1.14 0',    0.1, 0.12, 1.7,  fr);
          box('-0.10 -1.14 0',    0.1, 0.12, 1.7,  fr);
          box('-0.10  0   -0.79', 0.1, 2.4,  0.12, fr);
          box('-0.10  0    0.79', 0.1, 2.4,  0.12, fr);
          // Glass at X=3.97 — OUTSIDE wall face (4.0), covers wall surface
          box('-0.03 0 0',         0.05, 2.16, 1.46, null, glm);
          // Glazing bars
          box('-0.05  0    0',     0.06, 2.16, 0.06, bar);
          box('-0.05  0.5  0',     0.06, 0.06, 1.46, bar);
          box('-0.05 -0.5  0',     0.06, 0.06, 1.46, bar);
          // Sill
          box('-0.12 -1.28 0',     0.22, 0.09, 2.0,  '#b8a870', null);
          // Lintel
          box('-0.14  1.32 0',     0.26, 0.12, 2.0,  '#b8a870', null);
        } else {
          // Frame: inner face Z=-8.95, wall face Z=-9.0 — 5cm gap, no z-fight
          box('0    1.14  0.10',   1.7,  0.12, 0.1,  fr);
          box('0   -1.14  0.10',   1.7,  0.12, 0.1,  fr);
          box('-0.79 0    0.10',   0.12, 2.4,  0.1,  fr);
          box(' 0.79 0    0.10',   0.12, 2.4,  0.1,  fr);
          // Glass at Z=-8.97 — OUTSIDE wall face (-9.0), covers wall surface
          box('0 0 0.03',           1.46, 2.16, 0.05, null, glm);
          // Glazing bars
          box('0    0    0.05',     0.06, 2.16, 0.06, bar);
          box('0    0.5  0.05',     1.46, 0.06, 0.06, bar);
          box('0   -0.5  0.05',     1.46, 0.06, 0.06, bar);
          // Sill
          box('0   -1.28 0.12',     2.0,  0.09, 0.22, '#b8a870', null);
          // Lintel
          box('0    1.32 0.14',     2.0,  0.12, 0.26, '#b8a870', null);
        }
        el.setAttribute('blast-tape', 'wall: ' + this.data.wall);
      }
    });
  </script>
</head>
<body>
<a-scene
  fog="type: linear; color: #c8b898; near: 22; far: 90"
  renderer="colorManagement: true; antialias: true; physicallyCorrectLights: true"
  shadow="type: pcfsoft"
  background="color: #c8b898">

  <!-- ═══════════════════════ ASSETS ═══════════════════════ -->
  <a-assets timeout="15000">
    <img id="pub-diff"    src="pub_tile_diffuse.jpg">
    <img id="pub-norm"    src="pub_tile_normal.jpg">
    <img id="pub-rough"   src="pub_tile_roughness.jpg">
    <img id="stone-diff"  src="sandstone_diffuse.jpg">
    <img id="stone-ao"    src="sandstone_ao.jpg">
    <img id="stone-rough" src="Sandstone_Rough.jpg">
    <img id="road-diff"   src="street_diffuse.jpg">
    <img id="road-norm"   src="street_normal.jpg">
    <img id="road-rough"  src="street_roughness.jpg">
    <img id="brick-diff"  src="brown_brick_diffuse.jpg">
    <img id="brick-norm"  src="brown_brick_normal.jpg">
    <img id="brick-rough" src="brown_brick_roughness.jpg">
    <img id="brick-ao"    src="brown_brick_ao.jpg">
    <audio id="blitz-snd" src="blitz.mp3" preload="auto"></audio>
    <audio id="vera-snd"  src="vera.mp3"  preload="auto"></audio>
    <a-asset-item id="pubdoors-glb"  src="Pubdoors.glb"></a-asset-item>
    <a-asset-item id="vic-street-glb" src="victorian_street_scene.glb"></a-asset-item>
  </a-assets>

  <!-- ═══════════════════════ AUDIO ═══════════════════════ -->
  <a-entity sound="src: #blitz-snd; autoplay: true; loop: true; volume: 0.7; positional: false"></a-entity>
  <a-entity position="5 2 -14"
    sound="src: #vera-snd; autoplay: true; loop: true; volume: 0.5;
           rolloffFactor: 2.5; maxDistance: 18; positional: true">
  </a-entity>

  <!-- ═══════════════════════ DAYTIME LIGHTING ═══════════════════════ -->
  <!-- Hemisphere: sky colour from above, warm-earth bounce from below -->
  <a-light type="hemisphere" color="#c8d8e8" groundColor="#6a5840" intensity="1.2"></a-light>
  <!-- Main sun — slightly overcast, angled for side-lit street depth -->
  <a-light type="directional" color="#fff4e0" intensity="1.4"
           position="-8 20 5" cast-shadow="true"
           shadow-camera-left="-35" shadow-camera-right="55"
           shadow-camera-top="35"  shadow-camera-bottom="-45"
           shadow-camera-near="0.5" shadow-camera-far="70"
           shadow-map-width="2048"  shadow-map-height="2048">
  </a-light>

  <!-- ═══════════════════════ STREET ═══════════════════════ -->
  <!-- Single master ground plane — eliminates seams -->
  <a-plane position="13 0.001 -14" rotation="-90 0 0" width="70" height="70"
    material="src: #road-diff; normalMap: #road-norm; roughnessMap: #road-rough;
              repeat: 35 35; roughness: 0.85; metalness: 0">
  </a-plane>

  <!-- ── PAVEMENT ── -->
  <a-plane position="3.4 0.15 -15.5"  rotation="-90 0 0" width="1.2" height="12"
           material="color: #585855; roughness: 0.95; metalness: 0">
  </a-plane>
  <a-plane position="13.0 0.15 -8.4"  rotation="-90 0 0" width="16" height="1.2"
           material="color: #585855; roughness: 0.95; metalness: 0">
  </a-plane>
  <a-plane position="3.9 0.15 -8.65"  rotation="-90 0 0" width="2.2" height="1.7"
           material="color: #585855; roughness: 0.95; metalness: 0">
  </a-plane>

  <!-- ── GRANITE CURB STONES ── -->
  <!-- West kerb — full run from far end to corner -->
  <a-box position="2.8 0.075 -15.5"
         width="0.12" height="0.15" depth="12"
         color="#404040">
  </a-box>
  <!-- West kerb extension — gap between main run and south kerb corner -->
  <a-box position="2.8 0.075 -8.65"
         width="0.12" height="0.15" depth="1.7"
         color="#404040">
  </a-box>
  <!-- South kerb -->
  <a-box position="11.9 0.075 -7.8"
         width="18.2" height="0.15" depth="0.12"
         color="#404040">
  </a-box>
  <!-- Diagonal kerb in front of door bevel -->
  <a-box position="4.588 0.075 -9.588"
         width="0.12" height="0.15" depth="1.3"
         rotation="0 45 0"
         color="#404040">
  </a-box>
  <a-box position="2.8 0.075 -7.8"
         width="0.12" height="0.15" depth="0.12"
         color="#404040">
  </a-box>

  <!-- ═══════════════════════════════════════════════════════════════════════
       THE ROYAL OAK — 10 m TALL, 3-STOREY

       Layer 1  Green tile   0.0 –  1.0 m   (ground floor base)
       Layer 2  Sandstone    1.0 –  3.5 m   (ground floor walls + pub sign)
       Layer 3  Brown brick  3.5 – 10.0 m   (upper two floors)
       Fascia               10.0 – 10.5 m

       ALL WINDOWS  1.7m × 2.4m  (war-window component)
       Ground floor  Y=2.2  (1.0–3.4 m — sandstone section)
       1st floor     Y=5.0  (3.8–6.2 m — brick section)
       2nd floor     Y=7.8  (6.6–9.0 m — brick section)

       West wall outer face X=4.0  — frame offset -0.08 (protrudes out), glass on face
       South wall outer face Z=-9.0 — frame offset +0.08 (protrudes out), glass on face
  ════════════════════════════════════════════════════════════════════════ -->

  <!-- ─── WEST FACADE ─────────────────────────────────────── -->
  <!-- Green tile base: 0–1 m (unchanged) -->
  <a-box position="4.125 0.5 -15.5" width="0.25" height="1.0" depth="11"
         material="src: #pub-diff; normalMap: #pub-norm; roughnessMap: #pub-rough;
                   color: #3d7818; repeat: 11 0.5; roughness: 0.15; metalness: 0.08">
  </a-box>
  <!-- Sandstone: 1–3.5 m (unchanged) -->
  <a-box position="4.125 2.25 -15.5" width="0.25" height="2.5" depth="11"
         material="src: #stone-diff; aoMap: #stone-ao; roughnessMap: #stone-rough;
                   repeat: 5.5 1.5; roughness: 0.88; metalness: 0">
  </a-box>
  <!-- Brown brick: 3.5–10 m -->
  <a-box position="4.125 6.75 -15.5" width="0.25" height="6.5" depth="11"
         material="src: #brick-diff; normalMap: #brick-norm; roughnessMap: #brick-rough; aoMap: #brick-ao; repeat: 13.8 17.1; roughness: 0.85; metalness: 0; normalScale: 2 2">
  </a-box>

  <!-- ── West windows — all 3 floors ── -->
  <a-entity war-window="wall: west" position="4.0 2.2 -11.75"></a-entity>
  <a-entity war-window="wall: west" position="4.0 2.2 -14.25"></a-entity>
  <a-entity war-window="wall: west" position="4.0 2.2 -16.75"></a-entity>
  <a-entity war-window="wall: west" position="4.0 2.2 -19.25"></a-entity>
  <a-entity war-window="wall: west" position="4.0 5.0 -11.75"></a-entity>
  <a-entity war-window="wall: west" position="4.0 5.0 -14.25"></a-entity>

<!-- ═══════════════════════ SCENE EXPORT ═══════════════════════ -->
<script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js" } }
</script>

<button id="export-btn" style="
  position: fixed; bottom: 20px; right: 20px; z-index: 9999;
  padding: 12px 20px; font-size: 15px; font-weight: bold;
  background: #1a1a1a; color: #fff; border: 2px solid #fff;
  border-radius: 6px; cursor: pointer;">
  Export Scene as GLB
</button>

<script type="module">
  import { GLTFExporter } from 'https://unpkg.com/three@0.158.0/examples/jsm/exporters/GLTFExporter.js';

  document.getElementById('export-btn').addEventListener('click', function () {
    const scene = document.querySelector('a-scene');
    if (!scene.hasLoaded) { alert('Scene still loading — please wait and try again.'); return; }

    const exporter = new GLTFExporter();
    exporter.parse(
      scene.object3D,
      function (result) {
        const blob = new Blob([result], { type: 'application/octet-stream' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = 'royal-oak-scene.glb';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        alert('Done! Check your Downloads folder for royal-oak-scene.glb');
      },
      function (err) { console.error('GLB export error:', err); alert('Export failed — check console.'); },
      { binary: true }
    );
  });
</script>
